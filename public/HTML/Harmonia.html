			function App() {
				const activeLyricRef = useRef(null);
				const [isPlayingAll, setIsPlayingAll] = useState(false);

				const [currentPage, setCurrentPage] = useState("home");
				const [favorites, setFavorites] = useState([1, 4]);
				const [currentSong, setCurrentSong] = useState(null);
				const [isPlaying, setIsPlaying] = useState(false);
				const [progress, setProgress] = useState(0);
				const [currentTime, setCurrentTime] = useState("0:00");
				const [showLyrics, setShowLyrics] = useState(true);
				const [audioElement, setAudioElement] = useState(null);
				const [selectedPlaylist, setSelectedPlaylist] = useState(null);
				const [showCreatePlaylistModal, setShowCreatePlaylistModal] =
					useState(false);
				const [newPlaylistName, setNewPlaylistName] = useState("");
				const [newPlaylistDescription, setNewPlaylistDescription] =
					useState("");
				const [showAddToPlaylistModal, setShowAddToPlaylistModal] =
					useState(false);
				const [songToAdd, setSongToAdd] = useState(null);
				const [volume, setVolume] = useState(80);
				const [isMuted, setIsMuted] = useState(false);
				const [isRepeat, setIsRepeat] = useState(false);
				const [isShuffle, setIsShuffle] = useState(false);
				const [error, setError] = useState(null);
				const [showFooter, setShowFooter] = useState(false);
				const [currentLyricIndex, setCurrentLyricIndex] = useState(0);
				const [parsedLyrics, setParsedLyrics] = useState([]);
				const [playHistory, setPlayHistory] = useState([]);
				const [miniPlayerVisible, setMiniPlayerVisible] = useState(false);
				const [currentView, setCurrentView] = useState("player");
				const [visualizerActive, setVisualizerVisible] = useState(false);
				const visualizerCanvasRef = useRef(null);
				const audioContextRef = useRef(null);
				const analyserRef = useRef(null);
				const visualizerAnimationRef = useRef(null);
				useEffect(() => {
					if (activeLyricRef.current) {
						activeLyricRef.current.scrollIntoView({
							behavior: "smooth",
							block: "center",
						});
					}
				}, [currentLyricIndex]);
				useEffect(() => {
					if (currentSong) {
						const parsed = parseLyrics(currentSong.lyrics);
						setParsedLyrics(parsed);
						setCurrentLyricIndex(0);
					}
				}, [currentSong]);
				useEffect(() => {
					document.documentElement.classList.toggle("dark", isDarkTheme);
				}, [isDarkTheme]);

				const audioRef = useRef(null);
				const progressIntervalRef = useRef(null);
				const timeoutRef = useRef(null);
				const containerRef = useRef(null);

				useEffect(() => {
					setShowFooter(currentPage === "home");
				}, [currentPage]);

				useEffect(() => {
					const audio = new Audio();
					audio.addEventListener("ended", handleSongEnd);
					audio.addEventListener("error", handleAudioError);
					audioRef.current = audio;
					setAudioElement(audio);

					return () => {
						clearInterval(progressIntervalRef.current);
						clearTimeout(timeoutRef.current);
						audio.pause();
						audio.removeEventListener("ended", handleSongEnd);
						audio.removeEventListener("error", handleAudioError);
					};
				}, []);

				useEffect(() => {
					if (audioRef.current) {
						audioRef.current.volume = isMuted ? 0 : volume / 100;
					}
				}, [volume, isMuted]);

				useEffect(() => {
					if (audioRef.current) {
						audioRef.current.loop = isRepeat;
					}
				}, [isRepeat]);

				const startProgressUpdate = () => {
					clearInterval(progressIntervalRef.current);
					progressIntervalRef.current = setInterval(() => {
						if (audioRef.current) {
							const currentTime = audioRef.current.currentTime;
							const currentProgress =
								(currentTime / audioRef.current.duration) * 100;
							setProgress(currentProgress || 0);
							setCurrentTime(formatTime(currentTime));

							if (parsedLyrics.length > 0) {
								for (let i = parsedLyrics.length - 1; i >= 0; i--) {
									if (currentTime >= parsedLyrics[i].time) {
										setCurrentLyricIndex(i);
										break;
									}
								}
							}
						}
					}, 1000);
				};
				const parseLyrics = (lyricsText) => {
					if (!lyricsText) return [];

					const lines = lyricsText
						.split("\n")
						.filter((line) => line.trim() !== "");
					const result = [];

					for (const line of lines) {
						const timeMatch = line.match(/\[(\d+):(\d+\.\d+)\]/);
						if (timeMatch) {
							const minutes = parseInt(timeMatch[1]);
							const seconds = parseFloat(timeMatch[2]);
							const timeInSeconds = minutes * 60 + seconds;
							const text = line.replace(/\[\d+:\d+\.\d+\]/, "").trim();

							if (text) {
								result.push({
									time: timeInSeconds,
									text: text,
								});
							}
						}
					}

					return result.sort((a, b) => a.time - b.time);
				};
				const toggleTheme = () => {
					const newTheme = !isDarkTheme;
					setIsDarkTheme(newTheme);
					document.documentElement.classList.toggle("dark", newTheme);
				};

				const formatTime = (seconds) => {
					if (isNaN(seconds)) return "0:00";
					const minutes = Math.floor(seconds / 60);
					const remainingSeconds = Math.floor(seconds % 60);
					return `${minutes}:${remainingSeconds.toString().padStart(2, "0")}`;
				};
				const playAllSongs = (songsToPlay, shuffle = false) => {
					if (!songsToPlay || songsToPlay.length === 0) return;

					let songsList = [...songsToPlay];
					if (shuffle) {
						songsList = songsList.sort(() => Math.random() - 0.5);
					}

					playSong(songsList[0]);

					playQueueRef.current = songsList.slice(1);

					setIsPlayingAll(true);
				};
				const playSong = (song) => {
					setError(null);

					if (currentSong && currentSong.id === song.id) {
						if (isPlaying) {
							audioRef.current.pause();
							setIsPlaying(false);
							clearInterval(progressIntervalRef.current);
						} else {
							audioRef.current
								.play()
								.then(() => {
									setCurrentSong(song);
									setIsPlaying(true);
									startProgressUpdate();
									setCurrentPage("player");

									setError(null);
								})
								.catch((err) => {
									console.error("Error playing audio:", err);

									if (audioRef.current.paused) {
										setError("Could not play the audio. Please try again.");
									}

									setCurrentSong(song);
									setCurrentPage("player");
								});
						}
					} else {
						if (audioRef.current) {
							audioRef.current.pause();
							clearInterval(progressIntervalRef.current);
						}

						audioRef.current.src = song.src;
						audioRef.current.load();

						audioRef.current.volume = isMuted ? 0 : volume / 100;
						audioRef.current.loop = isRepeat;

						audioRef.current
							.play()
							.then(() => {
								setCurrentSong(song);
								setIsPlaying(true);
								startProgressUpdate();
								setCurrentPage("player");
							})
							.catch((err) => {
								console.error("Error playing audio:", err);
								setError("Could not play the audio. Please try again.");

								setCurrentSong(song);
								setCurrentPage("player");
							});
					}
				};

				const handleAudioError = (e) => {
					console.error("Audio error:", e);
					setError("Error loading audio. The file might be unavailable.");
					setIsPlaying(false);
					clearInterval(progressIntervalRef.current);
				};

					clearInterval(progressIntervalRef.current);

					if (isRepeat) {
						startProgressUpdate();
						return;
					}

					if (isPlayingAll && playQueueRef.current.length > 0) {
						const nextSong = playQueueRef.current.shift();
						playSong(nextSong);
						return;
					}

					setIsPlayingAll(false);
					setProgress(0);
					setCurrentTime("0:00");

					let nextSong;
					if (isShuffle) {
						const availableSongs = songsData.filter(
							(song) => song.id !== currentSong.id
						);
						nextSong =
							availableSongs[Math.floor(Math.random() * availableSongs.length)];
					} else {
						const currentIndex = songsData.findIndex(
							(song) => song.id === currentSong.id

						const nextIndex = (currentIndex + 1) % songsData.length;
						nextSong = songsData[nextIndex];

					playSong(nextSong);

							(song) => song.id !== currentSong.id

						playSong(
							availableSongs[Math.floor(Math.random() * availableSongs.length)]

						return;
					}

					const currentIndex = songsData.findIndex(
						(song) => song.id === currentSong.id
					);
					const prevIndex =
						currentIndex === 0 ? songsData.length - 1 : currentIndex - 1;
					playSong(songsData[prevIndex]);

				const playNextSong = () => {
					if (!currentSong) return;

						const availableSongs = songsData.filter(

													<div className="font-medium">{playlist.title}</div>
													<div className="text-sm text-textLightSecondary dark:text-textDarkSecondary">
														{playlist.description}
													</div>
												</div>
											</div>
										))}
									</div>

									<div className="flex justify-end">
										<button
											className="modal-btn secondary"
											onClick={() => setShowAddToPlaylistModal(false)}
										>
											Cancel
										</button>
									</div>
								</div>
							</div>
						)}
					</div>
				);
			}

			ReactDOM.render(<App />, document.getElementById("root"));
		</script>
	</body>
</html>
