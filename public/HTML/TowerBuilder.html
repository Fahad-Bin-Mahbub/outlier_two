<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tower Builder</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
			rel="stylesheet"
		/>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							primary: "#6366F1",
							secondary: "#EC4899",
							accent: "#8B5CF6",
							background: "#0F172A",
						},
						animation: {
							float: "float 3s ease-in-out infinite",
							slide: "slide 1.5s ease-in-out",
							fall: "fall 0.5s ease-in",
							"pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
						},
						keyframes: {
							float: {
								"0%, 100%": { transform: "translateY(0)" },
								"50%": { transform: "translateY(-10px)" },
							},
							slide: {
								"0%": { transform: "translateX(-100%)" },
								"100%": { transform: "translateX(100%)" },
							},
							fall: {
								"0%": { transform: "translateY(0)", opacity: "1" },
								"100%": { transform: "translateY(100vh)", opacity: "0" },
							},
						},
					},
				},
			};
		</script>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

			body {
				font-family: "Poppins", sans-serif;
				overflow: hidden;
				touch-action: manipulation;
				background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
			}

			.glass {
				background: rgba(255, 255, 255, 0.1);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				border: 1px solid rgba(255, 255, 255, 0.2);
				box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
			}

			.block {
				background: linear-gradient(
					45deg,
					var(--start-color),
					var(--end-color)
				);
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
				transition: all 0.3s ease;
			}

			.glow {
				box-shadow: 0 0 15px var(--glow-color);
			}

			#canvas {
				touch-action: none;
			}

			@media (max-width: 640px) {
				.text-4xl {
					font-size: 1.75rem;
				}
				.text-2xl {
					font-size: 1.25rem;
				}
				.text-xl {
					font-size: 1rem;
				}
				.p-6 {
					padding: 1rem;
				}
				.px-6 {
					padding-left: 1rem;
					padding-right: 1rem;
				}
				.py-3 {
					padding-top: 0.5rem;
					padding-bottom: 0.5rem;
				}
			}
		</style>
	</head>
	<body class="bg-background text-white min-h-screen">
		<!-- Background Particles -->
		<div id="particles" class="fixed inset-0 -z-10"></div>

		<!-- Game Container -->
		<div
			class="flex flex-col items-center justify-start min-h-screen p-4 relative"
		>
			<!-- Header -->
			<div
				class="glass rounded-xl px-6 py-3 mb-4 w-full max-w-md flex justify-between items-center"
			>
				<div>
					<h1
						class="text-2xl font-bold bg-gradient-to-r from-primary to-secondary text-transparent bg-clip-text"
					>
						Tower Builder
					</h1>
				</div>
				<div class="flex space-x-2">
					<span id="score" class="text-xl font-semibold">0</span>
					<span class="text-xl font-semibold text-secondary"
						><i class="fas fa-tower-observation"></i
					></span>
				</div>
			</div>

			<!-- Game Canvas -->
			<div
				id="canvasContainer"
				class="relative w-full max-w-lg h-[70vh] overflow-hidden glass rounded-xl mb-4"
			>
				<canvas id="canvas" class="w-full h-full"></canvas>

				<!-- Game Overlays -->
				<div
					id="startScreen"
					class="absolute inset-0 flex flex-col items-center justify-center bg-background bg-opacity-80 z-10"
				>
					<h2
						class="text-4xl font-bold mb-6 animate-float bg-gradient-to-r from-primary to-secondary text-transparent bg-clip-text"
					>
						Tower Builder
					</h2>
					<p class="text-xl text-center mb-8 max-w-xs">
						Stack blocks as high as possible without letting them fall!
					</p>
					<button
						id="startButton"
						class="px-8 py-3 rounded-full font-bold transition-all duration-300 bg-gradient-to-r from-primary to-secondary hover:from-secondary hover:to-primary transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary"
					>
						Start Game
					</button>
				</div>

				<div
					id="gameOverScreen"
					class="absolute inset-0 flex flex-col items-center justify-center bg-background bg-opacity-90 z-10 hidden"
				>
					<h2 class="text-4xl font-bold mb-2 text-secondary">Game Over</h2>
					<p class="text-xl mb-2">Your Tower Height:</p>
					<p
						id="finalScore"
						class="text-4xl font-bold mb-6 bg-gradient-to-r from-primary to-secondary text-transparent bg-clip-text"
					>
						0
					</p>
					<p id="highScore" class="text-lg mb-6">Highest: 0</p>

					<div class="flex flex-col sm:flex-row gap-3 mb-6">
						<button
							id="restartButton"
							class="px-6 py-3 rounded-full font-bold transition-all duration-300 bg-gradient-to-r from-primary to-secondary hover:from-secondary hover:to-primary transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary"
						>
							Play Again
						</button>
						<button
							id="shareButton"
							class="px-6 py-3 rounded-full font-bold transition-all duration-300 glass hover:bg-white hover:bg-opacity-20 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-white"
						>
							<i class="fas fa-share-alt mr-2"></i> Share
						</button>
					</div>
				</div>
			</div>

			<!-- Controls -->
			<div
				class="glass rounded-xl p-4 w-full max-w-md flex justify-between items-center"
			>
				<button
					id="soundButton"
					class="p-3 rounded-full glass transition-all hover:bg-white hover:bg-opacity-20 active:scale-95"
				>
					<i class="fas fa-volume-high"></i>
				</button>
				<div class="text-center">
					<p class="text-sm opacity-80">Tap / Click to drop blocks</p>
				</div>
				<button
					id="pauseButton"
					class="p-3 rounded-full glass transition-all hover:bg-white hover:bg-opacity-20 active:scale-95"
				>
					<i class="fas fa-pause"></i>
				</button>
			</div>
		</div>

		<!-- Pause Modal -->
		<div
			id="pauseModal"
			class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-20 hidden"
		>
			<div class="glass rounded-xl p-6 max-w-xs w-full">
				<h2 class="text-2xl font-bold text-center mb-6">Game Paused</h2>
				<div class="flex flex-col gap-3">
					<button
						id="resumeButton"
						class="px-6 py-3 rounded-full font-bold transition-all duration-300 bg-gradient-to-r from-primary to-secondary hover:from-secondary hover:to-primary transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary"
					>
						Resume Game
					</button>
					<button
						id="restartFromPauseButton"
						class="px-6 py-3 rounded-full font-bold transition-all duration-300 glass hover:bg-white hover:bg-opacity-20 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-white"
					>
						Restart Game
					</button>
				</div>
			</div>
		</div>

		<!-- Share Modal -->
		<div
			id="shareModal"
			class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-20 hidden"
		>
			<div class="glass rounded-xl p-6 max-w-xs w-full">
				<h2 class="text-2xl font-bold text-center mb-4">Share Your Score</h2>
				<p class="text-center mb-6">
					I built a tower of
					<span id="shareScore" class="font-bold text-secondary">0</span> blocks
					in Tower Builder!
				</p>

				<div class="grid grid-cols-4 gap-4 mb-6">
					<button
						class="share-btn flex items-center justify-center p-3 rounded-full glass hover:bg-primary hover:bg-opacity-30 transition-all"
						data-platform="twitter"
					>
						<i class="fab fa-twitter text-xl"></i>
					</button>
					<button
						class="share-btn flex items-center justify-center p-3 rounded-full glass hover:bg-blue-600 hover:bg-opacity-30 transition-all"
						data-platform="facebook"
					>
						<i class="fab fa-facebook-f text-xl"></i>
					</button>
					<button
						class="share-btn flex items-center justify-center p-3 rounded-full glass hover:bg-pink-600 hover:bg-opacity-30 transition-all"
						data-platform="instagram"
					>
						<i class="fab fa-instagram text-xl"></i>
					</button>
					<button
						class="share-btn flex items-center justify-center p-3 rounded-full glass hover:bg-green-600 hover:bg-opacity-30 transition-all"
						data-platform="whatsapp"
					>
						<i class="fab fa-whatsapp text-xl"></i>
					</button>
				</div>

				<button
					id="closeShareModal"
					class="w-full px-6 py-3 rounded-full font-bold transition-all duration-300 glass hover:bg-white hover:bg-opacity-20 transform hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-white"
				>
					Close
				</button>
			</div>
		</div>

				// Canvas Resize
				function resizeCanvas() {
					const container = document.getElementById("canvasContainer");
					canvas.width = container.clientWidth;
					canvas.height = container.clientHeight;

					// Adjust block width based on canvas size
					blockWidth = Math.min(100, canvas.width * 0.25);

					// Reset game view if needed
					if (gameState === "playing") {
						centerViewOnBlocks();
					}
				}

				// Initialize particles
				function initParticles() {
					particles = [];
					for (let i = 0; i < particleCount; i++) {
						particles.push({
							x: Math.random() * window.innerWidth,
							y: Math.random() * window.innerHeight,
							size: Math.random() * 3 + 1,
							speedX: Math.random() * 0.2 - 0.1,
							speedY: Math.random() * 0.2 - 0.1,
							opacity: Math.random() * 0.5 + 0.1,
						});
					}
				}

				// Draw particles
				function drawParticles() {
					const particlesContainer = document.getElementById("particles");
					particlesContainer.innerHTML = "";

					particles.forEach((particle) => {
						const div = document.createElement("div");
						div.className = "absolute rounded-full bg-white bg-opacity-50";
						div.style.left = particle.x + "px";
						div.style.top = particle.y + "px";
						div.style.width = particle.size + "px";
						div.style.height = particle.size + "px";
						div.style.opacity = particle.opacity;
						particlesContainer.appendChild(div);

						// Move particle
						particle.x += particle.speedX;
						particle.y += particle.speedY;

						// Wrap around
						if (particle.x < 0) particle.x = window.innerWidth;
						if (particle.x > window.innerWidth) particle.x = 0;
						if (particle.y < 0) particle.y = window.innerHeight;
						if (particle.y > window.innerHeight) particle.y = 0;
					});
				}

				// Initialize Game
				function init() {
					resizeCanvas();
					highScoreDisplay.textContent = `Highest: ${highScore}`;
					initParticles();

					// Event Listeners
					window.addEventListener("resize", resizeCanvas);

					canvas.addEventListener("click", handleTap);
					canvas.addEventListener("touchstart", function (e) {
						e.preventDefault(); // Prevent scrolling
						handleTap(e);
					});

					startButton.addEventListener("click", startGame);
					restartButton.addEventListener("click", startGame);
					restartFromPauseButton.addEventListener("click", startGame);
					shareButton.addEventListener("click", showShareModal);
					pauseButton.addEventListener("click", pauseGame);
					resumeButton.addEventListener("click", resumeGame);
					soundButton.addEventListener("click", toggleSound);
					closeShareModal.addEventListener("click", closeModal);

					// Share buttons
					shareBtns.forEach((btn) => {
						btn.addEventListener("click", function () {
							shareScore(this.dataset.platform);
						});
					});

					// Start animation loop
					animationLoop();
				}

				function startGame() {
					// Reset game variables
					blocks = [];
					score = 0;
					scoreDisplay.textContent = score;
					gameViewport = { x: 0, y: 0 };
					difficulty = 1;

					// Create first block (ground)
					const groundBlock = {
						x: canvas.width / 2 - blockWidth / 2,
						y: canvas.height - groundHeight,
						width: blockWidth,
						height: blockHeight,
						color: getNextBlockColor(),
					};

					blocks.push(groundBlock);
					lastBlockPos = {
						x: groundBlock.x,
						y: groundBlock.y,
						width: groundBlock.width,
					};

					// Create first moving block
					createNewBlock();

					// Hide screens
					startScreen.classList.add("hidden");
					gameOverScreen.classList.add("hidden");
					pauseModal.classList.add("hidden");
					shareModal.classList.add("hidden");

					// Update game state
					gameState = "playing";

					// Update pause button icon
					pauseButton.innerHTML = '<i class="fas fa-pause"></i>';

					// Update sound button icon
					soundButton.innerHTML = soundEnabled
						? '<i class="fas fa-volume-high"></i>'
						: '<i class="fas fa-volume-xmark"></i>';
				}

				function createNewBlock() {
					const prevBlock = blocks[blocks.length - 1];

					// Determine starting position (alternate sides)
					const startX = blocks.length % 2 === 0 ? -blockWidth : canvas.width;

					// Create new block
					currentBlock = {
						x: startX,
						y: prevBlock.y - (blockHeight + blocksGap),
						width: lastBlockPos.width,
						height: blockHeight,
						color: getNextBlockColor(),
					};

					// Set direction based on starting position
					direction = startX < 0 ? 1 : -1;
				}

				function getNextBlockColor() {
					const colorIndex = blocks.length % blockColors.length;
					return blockColors[colorIndex];
				}

				function centerViewOnBlocks() {
					if (blocks.length <= 1) return;

					// Calculate where the view should be centered
					const topBlock = currentBlock || blocks[blocks.length - 1];
					const targetY = canvas.height / 2 - topBlock.y;

					// Smoothly move the viewport
					gameViewport.y = gameViewport.y * 0.9 + targetY * 0.1;
				}

				function handleTap() {
					if (gameState !== "playing") return;

					// Place the current block
					placeBlock();
				}

				function placeBlock() {
					if (!currentBlock) return;

					const prevBlock = blocks[blocks.length - 1];

					// Calculate overlap
					const overlapStart = Math.max(currentBlock.x, prevBlock.x);
					const overlapEnd = Math.min(
						currentBlock.x + currentBlock.width,
						prevBlock.x + prevBlock.width
					);
					const overlapWidth = overlapEnd - overlapStart;

					if (overlapWidth <= 0) {
						// Block fell off - Game Over
						gameOver();
						return;
					}

					// Play sound
					if (soundEnabled) {
						dropSound.currentTime = 0;
						dropSound.play();
					}

					// Adjust current block position and width based on overlap
					currentBlock.x = overlapStart;
					currentBlock.width = overlapWidth;

					// Add to blocks array
					blocks.push(currentBlock);

					// Update last block position for next block creation
					lastBlockPos = {
						x: currentBlock.x,
						y: currentBlock.y,
						width: currentBlock.width,
					};

					// Update score
					score++;
					scoreDisplay.textContent = score;

					// Play score sound every 5 points
					if (score % 5 === 0 && soundEnabled) {
						scoreSound.currentTime = 0;
						scoreSound.play();
					}

					// Increase difficulty
					if (score % 5 === 0) {
						difficulty += 0.2;
					}

					// Create a new block
					createNewBlock();
				}

				function gameOver() {
					gameState = "gameOver";

					// Play game over sound
					if (soundEnabled) {
						gameOverSound.currentTime = 0;
						gameOverSound.play();
					}

					// Update high score if needed
					if (score > highScore) {
						highScore = score;
						localStorage.setItem("towerHighScore", highScore);
					}

					// Show game over screen
					finalScoreDisplay.textContent = score;
					highScoreDisplay.textContent = `Highest: ${highScore}`;
					shareScoreDisplay.textContent = score;
					gameOverScreen.classList.remove("hidden");
				}

				function pauseGame() {
					if (gameState === "playing") {
						gameState = "paused";
						pauseModal.classList.remove("hidden");
						pauseButton.innerHTML = '<i class="fas fa-play"></i>';
					} else if (gameState === "paused") {
						resumeGame();
					}
				}

				function resumeGame() {
					gameState = "playing";
					pauseModal.classList.add("hidden");
					pauseButton.innerHTML = '<i class="fas fa-pause"></i>';
				}

				function toggleSound() {
					soundEnabled = !soundEnabled;
					soundButton.innerHTML = soundEnabled
						? '<i class="fas fa-volume-high"></i>'
						: '<i class="fas fa-volume-xmark"></i>';
				}

				function showShareModal() {
					shareModal.classList.remove("hidden");
				}

				function closeModal() {
					pauseModal.classList.add("hidden");
					shareModal.classList.add("hidden");
				}

				function shareScore(platform) {
					const text = `I built a tower of ${score} blocks in Tower Builder! Can you beat my score?`;
					const url = window.location.href;

					let shareUrl = "";

					switch (platform) {
						case "twitter":
							shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(
								text
							)}&url=${encodeURIComponent(url)}`;
							break;
						case "facebook":
							shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(
								url
							)}&quote=${encodeURIComponent(text)}`;
							break;
						case "instagram":
							// Instagram doesn't have a web API for sharing, so we'll just copy to clipboard
							navigator.clipboard.writeText(text + " " + url);
							alert("Caption copied to clipboard! Open Instagram to share.");
							return;
						case "whatsapp":
							shareUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(
								text + " " + url
							)}`;
							break;
					}

					if (shareUrl) {
						window.open(shareUrl, "_blank");
					}
				}

				function update() {
					if (gameState !== "playing") return;

					// Update current block position
					if (currentBlock) {
						currentBlock.x += moveSpeed * direction * difficulty;

						// Reverse direction when hitting edges
						if (
							currentBlock.x + currentBlock.width > canvas.width ||
							currentBlock.x < 0
						) {
							direction *= -1;
						}
					}

					// Center viewport on blocks
					centerViewOnBlocks();
				}

				function draw() {
					// Clear canvas
					ctx.clearRect(0, 0, canvas.width, canvas.height);

					// Apply viewport transformation
					ctx.save();
					ctx.translate(gameViewport.x, gameViewport.y);

					// Draw blocks
					blocks.forEach((block, index) => {
						// Set block gradient color
						ctx.fillStyle = getBlockGradient(block);

						// Draw block
						ctx.beginPath();
						ctx.rect(block.x, block.y, block.width, block.height);
						ctx.fill();

						// Add glow effect for top blocks
						if (index >= blocks.length - 3) {
							ctx.shadowColor = block.color.glow;
							ctx.shadowBlur = 10;
						} else {
							ctx.shadowBlur = 0;
						}
					});

					// Reset shadow
					ctx.shadowBlur = 0;

					// Draw current moving block
					if (currentBlock && gameState === "playing") {
						// Set block gradient color
						ctx.fillStyle = getBlockGradient(currentBlock);

						// Add glow effect
						ctx.shadowColor = currentBlock.color.glow;
						ctx.shadowBlur = 10;

						// Draw block
						ctx.beginPath();
						ctx.rect(
							currentBlock.x,
							currentBlock.y,
							currentBlock.width,
							currentBlock.height
						);
						ctx.fill();

						// Reset shadow
						ctx.shadowBlur = 0;
					}

					// Restore canvas state
					ctx.restore();
				}

				function getBlockGradient(block) {
					const gradient = ctx.createLinearGradient(
						block.x,
						block.y,
						block.x + block.width,
						block.y + block.height
					);
					gradient.addColorStop(0, block.color.start);
					gradient.addColorStop(1, block.color.end);
					return gradient;
				}

				function animationLoop() {
					// Update particles
					drawParticles();

					// Update game logic
					update();

					// Draw game
					draw();

					// Loop
					requestAnimationFrame(animationLoop);
				}

				// Initialize game
				init();
			});
		</script>
