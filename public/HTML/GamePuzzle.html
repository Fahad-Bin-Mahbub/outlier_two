<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>River Crossing Puzzle</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>

	<div
		id="character-select-modal"
		class="fixed inset-0 bg-black/60 flex justify-center items-center z-[1000]"
		style="display: flex"
	>
		<div
			class="bg-white p-5 rounded-lg shadow-lg text-center w-[90%] max-w-[350px] md:w-4/5 md:max-w-[400px]"
		>
			<p class="mb-4 text-lg text-[#333]">Choose your character:</p>
			<div id="character-options" class="flex justify-center gap-5 mb-5">
				<div
					class="character-option w-10 h-[50px] rounded-lg border-4 border-blue-500 cursor-pointer"
					data-color="#FF5733"
					style="background: #ff5733"
				></div>
				<div
					class="character-option w-10 h-[50px] rounded-lg border-4 border-blue-500 cursor-pointer"
					data-color="#00ff00"
					style="background: #00ff00"
				></div>
				<div
					class="character-option w-10 h-[50px] rounded-lg border-4 border-cyan-400 cursor-pointer"
					data-color="#00ffff"
					style="background: #00ffff"
				></div>
			</div>
		</div>
	</div>

	<body
		class="font-sans min-h-screen flex flex-col items-center justify-center bg-gradient-to-b from-[#87CEEB] to-[#1E90FF] overflow-x-hidden px-6"
	>
		<div
			class="game-container bg-white/90 rounded-[15px] shadow-[0_10px_30px_rgba(0,0,0,0.2)] p-4 md:p-6 text-center relative w-[95%] max-w-[800px]"
		>
			<h1 class="text-[#2c3e50] mt-0 mb-4 text-[1.8em] md:text-[2em] font-bold">
				River Crossing Puzzle
			</h1>

			<div class="game-controls my-4 flex flex-wrap justify-center gap-2">
				<button
					id="undo-btn"
					disabled
					class="bg-green-500 text-white border-none px-4 py-2 mx-1 rounded-lg font-bold shadow-md text-sm transition hover:bg-green-600 hover:-translate-y-0.5 hover:shadow-lg disabled:bg-gray-400 disabled:cursor-not-allowed"
				>
					Undo
				</button>
				<button
					id="redo-btn"
					disabled
					class="bg-green-500 text-white border-none px-4 py-2 mx-1 rounded-lg font-bold shadow-md text-sm transition hover:bg-green-600 hover:-translate-y-0.5 hover:shadow-lg disabled:bg-gray-400 disabled:cursor-not-allowed"
				>
					Redo
				</button>
				<button
					id="restart-btn"
					class="bg-green-500 text-white border-none px-4 py-2 mx-1 rounded-lg font-bold shadow-md text-sm transition hover:bg-green-600 hover:-translate-y-0.5 hover:shadow-lg"
				>
					Restart
				</button>
			</div>

			<canvas
				id="game-canvas"
				class="block mx-auto rounded-lg shadow-[0_5px_15px_rgba(0,0,0,0.2)] bg-[#f0f8ff] max-w-full h-auto"
			></canvas>

			<div
				class="game-stats flex flex-col items-center gap-2 my-2 md:flex-row md:justify-between md:my-4"
			>
				<div
					class="stat bg-blue-500 text-white px-4 py-2 rounded-full font-bold shadow text-sm w-4/5 md:w-auto md:px-5 md:py-2.5 md:text-base"
				>
					Moves Left: <span id="moves-left">3</span>
				</div>
				<div
					class="stat bg-blue-500 text-white px-4 py-2 rounded-full font-bold shadow text-sm w-4/5 md:w-auto md:px-5 md:py-2.5 md:text-base"
				>
					Platforms: <span id="platforms-left">2</span>
				</div>
			</div>

			<div
				class="instructions mt-4 text-[#34495e] text-sm md:text-base max-w-full leading-relaxed px-2"
			>
				<p>
					Help the character cross the river! Drag platforms to create a path
					and click/tap to make the character jump. Be careful - you have
					limited moves and platforms!
				</p>
			</div>

			<div
				id="message-modal"
				class="fixed inset-0 bg-black/60 flex justify-center items-center z-[1000] hidden"
			>
				<div
					class="bg-white p-5 rounded-lg shadow-lg text-center w-[90%] max-w-[350px] md:w-4/5 md:max-w-[400px]"
				>
					<p id="modal-message-text" class="mb-4 text-lg text-[#333]">
						Message goes here
					</p>
					<button
						id="modal-ok-btn"
						class="bg-red-500 text-white px-5 py-2 rounded-lg font-bold text-base transition hover:bg-red-600"
					>
						OK
					</button>
				</div>
			</div>
		</div>

		<script>
			const INITIAL_CANVAS_WIDTH = 800;
			const INITIAL_CANVAS_HEIGHT = 500;
			const GRAVITY = 0.5;
			const INITIAL_WATER_LEVEL = 350;
			const INITIAL_WATER_HEIGHT = 150;
			const INITIAL_PLATFORM_WIDTH = 60;
			const INITIAL_PLATFORM_HEIGHT = 20;
			const FIXED_PLATFORM_WIDTH = 100;
			const FIXED_PLATFORM_HEIGHT = 20;
			const INITIAL_CHARACTER_WIDTH = 30;
			const INITIAL_CHARACTER_HEIGHT = 50;
			const MAX_MOVES = 3;
			const JUMP_ANIMATION_SPEED = 0.2;

			let isJumpPreviewing = false;
			let jumpPreviewVector = { x: 0, y: 0 };
			let jumpPreviewMagnitude = 0;
			let canvas, ctx;
			let scaleFactor = 1;
			let currentCanvasWidth = INITIAL_CANVAS_WIDTH;
			let currentCanvasHeight = INITIAL_CANVAS_HEIGHT;

			let character = {
				x: 50,
				y: INITIAL_WATER_LEVEL - INITIAL_CHARACTER_HEIGHT,
				width: INITIAL_CHARACTER_WIDTH,
				height: INITIAL_CHARACTER_HEIGHT,
				vx: 0,
				vy: 0,
				isJumping: false,
				isOnPlatform: true,
				facingRight: true,
			};

			let platforms = [];
			let fixedPlatforms = [];
			let movesLeft = MAX_MOVES;
			let isGameOver = false;
			let isGameWon = false;
			let isDragging = false;
			let selectedPlatform = null;
			let dragOffsetX = 0;
			let dragOffsetY = 0;
			let waterOffset = 0;
			let pathVisualization = [];

			let gameHistory = [];
			let historyIndex = -1;

			let messageModal, modalMessageText, modalOkBtn;

			let selectedCharacterColor = "#FF5733";

			function resizeCanvasAndGame() {
				const container = canvas.parentElement;
				currentCanvasWidth = container.offsetWidth;
				currentCanvasHeight =
					currentCanvasWidth * (INITIAL_CANVAS_HEIGHT / INITIAL_CANVAS_WIDTH);

				canvas.width = currentCanvasWidth;
				canvas.height = currentCanvasHeight;

				scaleFactor = currentCanvasWidth / INITIAL_CANVAS_WIDTH;
				render();
			}

			function showCharacterSelectModal() {
				document.getElementById("character-select-modal").style.display =
					"flex";
			}

			function hideCharacterSelectModal() {
				document.getElementById("character-select-modal").style.display =
					"none";
				document.querySelector(".game-container").style.display = "";
			}

			document.addEventListener("DOMContentLoaded", () => {
				const options = document.querySelectorAll(".character-option");
				options.forEach((opt) => {
					opt.addEventListener("click", function () {
						options.forEach((o) => {
							o.classList.remove(
								"ring-4",
								"ring-yellow-400",
								"shadow-yellow-400"
							);
						});
						this.classList.add(
							"ring-4",
							"ring-yellow-400",
							"shadow-yellow-400"
						);
						selectedCharacterColor = this.getAttribute("data-color");
						setTimeout(() => {
							hideCharacterSelectModal();
							initializeGame();
							gameLoop();
						}, 200);
					});
				});
				showCharacterSelectModal();
			});

			window.onload = function () {
				canvas = document.getElementById("game-canvas");
				ctx = canvas.getContext("2d");

				messageModal = document.getElementById("message-modal");
				modalMessageText = document.getElementById("modal-message-text");
				modalOkBtn = document.getElementById("modal-ok-btn");

				canvas.addEventListener("mousedown", handleMouseDown);
				canvas.addEventListener("mousemove", handleMouseMove);
				canvas.addEventListener("mouseup", handleMouseUp);
				canvas.addEventListener("mouseleave", handleMouseUp);

				canvas.addEventListener("touchstart", handleTouchStart, {
					passive: false,
				});
				canvas.addEventListener("touchmove", handleTouchMove, {
					passive: false,
				});
				canvas.addEventListener("touchend", handleTouchEnd, { passive: false });
				canvas.addEventListener("touchcancel", handleTouchEnd, {
					passive: false,
				});

				document.getElementById("undo-btn").addEventListener("click", undo);
				document.getElementById("redo-btn").addEventListener("click", redo);
				document
					.getElementById("restart-btn")
					.addEventListener("click", restart);
				modalOkBtn.addEventListener("click", hideMessage);

				window.addEventListener("resize", resizeCanvasAndGame);
				initializeGame();
				gameLoop();
			};

			function handleTouchStart(e) {
				e.preventDefault();
				const touch = e.touches[0];
				const mockMouseEvent = new MouseEvent("mousedown", {
					clientX: touch.clientX,
					clientY: touch.clientY,
				});
				canvas.dispatchEvent(mockMouseEvent);
			}

			function handleTouchMove(e) {
				e.preventDefault();
				const touch = e.touches[0];
				const mockMouseEvent = new MouseEvent("mousemove", {
					clientX: touch.clientX,
					clientY: touch.clientY,
				});
				canvas.dispatchEvent(mockMouseEvent);
			}

			function handleTouchEnd(e) {
				e.preventDefault();
				const mockMouseEvent = new MouseEvent("mouseup", {});
				canvas.dispatchEvent(mockMouseEvent);
			}

			function showMessage(message, type = "default") {
				modalMessageText.textContent = message;
				modalOkBtn.className =
					"px-5 py-2 rounded-lg font-bold text-base transition";
				if (type === "win") {
					modalOkBtn.classList.add(
						"bg-green-500",
						"hover:bg-green-600",
						"text-white"
					);
				} else if (type === "lose") {
					modalOkBtn.classList.add(
						"bg-red-500",
						"hover:bg-red-600",
						"text-white"
					);
				} else {
					modalOkBtn.classList.add(
						"bg-blue-500",
						"hover:bg-blue-600",
						"text-white"
					);
				}
				messageModal.style.display = "flex";
			}

			function hideMessage() {
				messageModal.style.display = "none";
				if (isGameOver || isGameWon) {
					setTimeout(() => {
						restart();
					}, 200);
				}
			}

			function initializeGame() {
				fixedPlatforms = [
					{
						x: 0,
						y: INITIAL_WATER_LEVEL,
						width: FIXED_PLATFORM_WIDTH,
						height: FIXED_PLATFORM_HEIGHT,
						color: "#654321",
						movable: false,
					},
					{
						x: INITIAL_CANVAS_WIDTH - FIXED_PLATFORM_WIDTH,
						y: INITIAL_WATER_LEVEL,
						width: FIXED_PLATFORM_WIDTH,
						height: FIXED_PLATFORM_HEIGHT,
						color: "#654321",
						movable: false,
					},
				];

				platforms = [
					{
						x: 120,
						y: INITIAL_WATER_LEVEL - 40,
						width: INITIAL_PLATFORM_WIDTH,
						height: INITIAL_PLATFORM_HEIGHT,
						color: "#8B4513",
						movable: true,
					},
					{
						x: INITIAL_CANVAS_WIDTH - (INITIAL_PLATFORM_WIDTH + 120),
						y: INITIAL_WATER_LEVEL - 80,
						width: INITIAL_PLATFORM_WIDTH,
						height: INITIAL_PLATFORM_HEIGHT,
						color: "#8B4513",
						movable: true,
					},
				];

				document.getElementById("platforms-left").textContent =
					platforms.length;
				document.getElementById("moves-left").textContent = movesLeft;

				character.x = 50;
				character.y = INITIAL_WATER_LEVEL - INITIAL_CHARACTER_HEIGHT;
				character.vx = 0;
				character.vy = 0;
				character.isJumping = false;
				character.isOnPlatform = true;
				character.facingRight = true;

				isGameOver = false;
				isGameWon = false;
				pathVisualization = [];
				hideMessage();
				resizeCanvasAndGame();
				saveGameState();
			}

			function gameLoop() {
				if (!isGameOver && !isGameWon) {
					update();
				}
				render();
				requestAnimationFrame(gameLoop);
			}

			function update() {
				character.vy += GRAVITY * JUMP_ANIMATION_SPEED;
				character.x += character.vx * JUMP_ANIMATION_SPEED;
				character.y += character.vy * JUMP_ANIMATION_SPEED;

				if (character.vx > 0) character.facingRight = true;
				else if (character.vx < 0) character.facingRight = false;

				character.isOnPlatform = false;
				const allPlatforms = [...platforms, ...fixedPlatforms];

				for (const platform of allPlatforms) {
					if (
						character.y + character.height > platform.y &&
						character.y + character.height <
							platform.y + platform.height + character.vy + 1 &&
						character.x + character.width > platform.x &&
						character.x < platform.x + platform.width
					) {
						character.y = platform.y - character.height;
						character.vy = 0;
						character.isOnPlatform = true;
						character.isJumping = false;
					}
				}

				if (character.isOnPlatform) {
					character.vx *= 0.9;
					if (Math.abs(character.vx) < 0.1) character.vx = 0;
				}

				if (character.x < 0) {
					character.x = 0;
					character.vx = 0;
				}
				if (character.x + character.width > INITIAL_CANVAS_WIDTH) {
					character.x = INITIAL_CANVAS_WIDTH - character.width;
					character.vx = 0;
				}

				if (
					character.y + character.height > INITIAL_WATER_LEVEL + 5 &&
					!isGameWon
				) {
					if (!isGameOver) {
						movesLeft--;
						document.getElementById("moves-left").textContent = movesLeft;
						saveGameState();

						if (
							character.x + character.width >= fixedPlatforms[1].x &&
							character.isOnPlatform &&
							Math.abs(fixedPlatforms[1].y - (character.y + character.height)) <
								1
						) {
							if (!isGameWon && !isGameOver) {
								isGameWon = true;
								showMessage("Congratulations! You crossed the river!", "win");
							}
						} else if (movesLeft <= 0) {
							isGameOver = true;
							showMessage(
								"Game Over! You fell into the water and ran out of moves.",
								"lose"
							);
						} else {
							character.x = 50;
							character.y = INITIAL_WATER_LEVEL - INITIAL_CHARACTER_HEIGHT;
							character.vx = 0;
							character.vy = 0;
							character.isJumping = false;
							character.isOnPlatform = true;
						}
					}
				}

				if (
					character.x + character.width >= fixedPlatforms[1].x &&
					character.isOnPlatform &&
					Math.abs(fixedPlatforms[1].y - (character.y + character.height)) < 1
				) {
					if (!isGameWon && !isGameOver) {
						isGameWon = true;
						showMessage("Congratulations! You crossed the river!", "win");
					}
				}

				if (movesLeft <= 0 && !isGameWon && character.isOnPlatform) {
					isGameOver = true;
					showMessage("Game Over! You ran out of moves.", "lose");
				}

				waterOffset += 0.3;
			}

			function render() {
				ctx.clearRect(0, 0, currentCanvasWidth, currentCanvasHeight);

				const skyGradient = ctx.createLinearGradient(
					0,
					0,
					0,
					INITIAL_WATER_LEVEL * scaleFactor
				);
				skyGradient.addColorStop(0, "#87CEEB");
				skyGradient.addColorStop(1, "#ADD8E6");
				ctx.fillStyle = skyGradient;
				ctx.fillRect(
					0,
					0,
					currentCanvasWidth,
					INITIAL_WATER_LEVEL * scaleFactor
				);

				drawClouds();
				drawWater();
				drawPathVisualization();

				for (const platform of fixedPlatforms) {
					drawPlatform(platform);
				}

				for (const platform of platforms) {
					drawPlatform(platform);
					if (platform === selectedPlatform) {
						ctx.strokeStyle = "#FFD700";
						ctx.lineWidth = 3 * scaleFactor;
						ctx.strokeRect(
							platform.x * scaleFactor,
							platform.y * scaleFactor,
							platform.width * scaleFactor,
							platform.height * scaleFactor
						);
					}
				}

				drawCharacter();
			}

			function drawClouds() {
				ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
				drawCloud(100, 50, 30);
				drawCloud(250, 80, 25);
				drawCloud(400, 70, 40);
				drawCloud(550, 60, 30);
				drawCloud(700, 40, 35);
			}

			function drawCloud(x, y, size) {
				const sX = x * scaleFactor;
				const sY = y * scaleFactor;
				const sSize = size * scaleFactor;

				ctx.beginPath();
				ctx.arc(sX, sY, sSize, 0, Math.PI * 2);
				ctx.arc(
					sX + sSize * 0.6,
					sY - sSize * 0.2,
					sSize * 0.7,
					0,
					Math.PI * 2
				);
				ctx.arc(
					sX + sSize * 0.3,
					sY - sSize * 0.1,
					sSize * 0.6,
					0,
					Math.PI * 2
				);
				ctx.arc(
					sX - sSize * 0.4,
					sY - sSize * 0.15,
					sSize * 0.6,
					0,
					Math.PI * 2
				);
				ctx.closePath();
				ctx.fill();
			}

			function drawWater() {
				const scaledWaterLevel = INITIAL_WATER_LEVEL * scaleFactor;
				const scaledWaterHeight = INITIAL_WATER_HEIGHT * scaleFactor;

				const waterGradient = ctx.createLinearGradient(
					0,
					scaledWaterLevel,
					0,
					currentCanvasHeight
				);
				waterGradient.addColorStop(0, "#1E90FF");
				waterGradient.addColorStop(0.7, "#005BBB");
				waterGradient.addColorStop(1, "#00008B");
				ctx.fillStyle = waterGradient;
				ctx.fillRect(
					0,
					scaledWaterLevel,
					currentCanvasWidth,
					currentCanvasHeight - scaledWaterLevel
				);

				const waveColors = [
					{
						color: "rgba(100, 149, 237, 0.5)",
						offsetFactor: 0.02,
						amplitude1: 7,
						amplitude2: 3,
						period1: 50,
						period2: 30,
					},
					{
						color: "rgba(135, 206, 250, 0.3)",
						offsetFactor: 0.035,
						amplitude1: 5,
						amplitude2: 2.5,
						period1: 35,
						period2: 25,
					},
					{
						color: "rgba(224, 255, 255, 0.2)",
						offsetFactor: 0.05,
						amplitude1: 3,
						amplitude2: 2,
						period1: 20,
						period2: 15,
					},
				];

				waveColors.forEach((wave) => {
					ctx.fillStyle = wave.color;
					ctx.beginPath();
					const startY =
						scaledWaterLevel +
						Math.sin(waterOffset * wave.offsetFactor) *
							((wave.amplitude1 / 2) * scaleFactor);
					ctx.moveTo(0, startY);
					for (let x = 0; x <= currentCanvasWidth; x += 10) {
						const xUnscaled = x / scaleFactor;
						const yOffset =
							Math.sin(
								xUnscaled / wave.period1 + waterOffset * wave.offsetFactor
							) *
								(wave.amplitude1 * scaleFactor) +
							Math.cos(
								xUnscaled / wave.period2 +
									waterOffset * (wave.offsetFactor * 0.75)
							) *
								(wave.amplitude2 * scaleFactor);
						ctx.lineTo(x, scaledWaterLevel + yOffset);
					}
					ctx.lineTo(currentCanvasWidth, currentCanvasHeight);
					ctx.lineTo(0, currentCanvasHeight);
					ctx.closePath();
					ctx.fill();
				});
			}

			function drawPlatform(platform) {
				ctx.fillStyle = platform.color;
				ctx.fillRect(
					platform.x * scaleFactor,
					platform.y * scaleFactor,
					platform.width * scaleFactor,
					platform.height * scaleFactor
				);

				if (platform.movable) {
					ctx.strokeStyle = "rgba(0, 0, 0, 0.15)";
					ctx.lineWidth = 1 * scaleFactor;
					for (let i = 5; i < platform.width - 5; i += 10) {
						ctx.beginPath();
						ctx.moveTo(
							(platform.x + i) * scaleFactor,
							(platform.y + 3) * scaleFactor
						);
						ctx.bezierCurveTo(
							(platform.x + i + 2) * scaleFactor,
							(platform.y + platform.height / 2) * scaleFactor,
							(platform.x + i - 2) * scaleFactor,
							(platform.y + platform.height / 2) * scaleFactor,
							(platform.x + i) * scaleFactor,
							(platform.y + platform.height - 3) * scaleFactor
						);
						ctx.stroke();
					}
				} else {
					ctx.fillStyle = "#228B22";
					ctx.fillRect(
						platform.x * scaleFactor,
						(platform.y - 3) * scaleFactor,
						platform.width * scaleFactor,
						3 * scaleFactor
					);
					ctx.fillStyle = "rgba(101, 67, 33, 0.5)";
					for (let i = 0; i < platform.width; i += 10) {
						ctx.fillRect(
							(platform.x + i) * scaleFactor,
							(platform.y + platform.height * 0.2) * scaleFactor,
							3 * scaleFactor,
							platform.height * 0.6 * scaleFactor
						);
					}
				}
			}

			function drawCharacter() {
				ctx.fillStyle = selectedCharacterColor || "#FF5733";
				ctx.fillRect(
					character.x * scaleFactor,
					character.y * scaleFactor,
					character.width * scaleFactor,
					character.height * scaleFactor
				);

				ctx.fillStyle = "black";
				const eyeSize = 4 * scaleFactor;
				if (character.facingRight) {
					ctx.fillRect(
						(character.x + character.width - 10) * scaleFactor,
						(character.y + 8) * scaleFactor,
						eyeSize,
						eyeSize
					);
				} else {
					ctx.fillRect(
						(character.x + 6) * scaleFactor,
						(character.y + 8) * scaleFactor,
						eyeSize,
						eyeSize
					);
				}

				ctx.fillStyle = "#D35400";
				const limbWidth = 4 * scaleFactor;
				const limbHeight = 10 * scaleFactor;
				const legHeight = 10 * scaleFactor;
				const legWidth = 5 * scaleFactor;

				if (character.isJumping) {
					ctx.fillRect(
						(character.x - 4) * scaleFactor,
						(character.y + 10) * scaleFactor,
						limbWidth,
						limbHeight
					);
					ctx.fillRect(
						(character.x + character.width) * scaleFactor,
						(character.y + 10) * scaleFactor,
						limbWidth,
						limbHeight
					);
				} else {
					ctx.fillRect(
						(character.x + character.width / 2 - 6) * scaleFactor,
						(character.y + character.height) * scaleFactor,
						legWidth,
						legHeight
					);
					ctx.fillRect(
						(character.x + character.width / 2 + 1) * scaleFactor,
						(character.y + character.height) * scaleFactor,
						legWidth,
						legHeight
					);
				}
			}

			function drawPathVisualization() {
				if (pathVisualization.length === 0) return;

				ctx.strokeStyle = "rgba(255, 255, 0, 0.6)";
				ctx.lineWidth = 2 * scaleFactor;
				ctx.beginPath();
				ctx.moveTo(
					(pathVisualization[0].x + character.width / 2) * scaleFactor,
					(pathVisualization[0].y + character.height / 2) * scaleFactor
				);

				for (let i = 1; i < pathVisualization.length; i++) {
					ctx.lineTo(
						(pathVisualization[i].x + character.width / 2) * scaleFactor,
						(pathVisualization[i].y + character.height / 2) * scaleFactor
					);
				}
				ctx.stroke();

				ctx.fillStyle = "rgba(255, 255, 0, 0.8)";
				for (let i = 0; i < pathVisualization.length; i += 5) {
					ctx.beginPath();
					ctx.arc(
						(pathVisualization[i].x + character.width / 2) * scaleFactor,
						(pathVisualization[i].y + character.height / 2) * scaleFactor,
						2.5 * scaleFactor,
						0,
						Math.PI * 2
					);
					ctx.fill();
				}
			}

			function getCanvasRelativeCoords(e, canvas) {
				const rect = canvas.getBoundingClientRect();
				const scaleX = canvas.width / rect.width;
				const scaleY = canvas.height / rect.height;
				return {
					x: (e.clientX - rect.left) * scaleX,
					y: (e.clientY - rect.top) * scaleY,
				};
			}

			function handleMouseDown(e) {
				if (isGameOver || isGameWon) return;

				const { x: mouseCanvasX, y: mouseCanvasY } = getCanvasRelativeCoords(
					e,
					canvas
				);

				const unscaledMouseX = mouseCanvasX / scaleFactor;
				const unscaledMouseY = mouseCanvasY / scaleFactor;

				for (let i = platforms.length - 1; i >= 0; i--) {
					const platform = platforms[i];
					if (
						unscaledMouseX >= platform.x &&
						unscaledMouseX <= platform.x + platform.width &&
						unscaledMouseY >= platform.y &&
						unscaledMouseY <= platform.y + platform.height
					) {
						isDragging = true;
						selectedPlatform = platform;
						dragOffsetX = unscaledMouseX - platform.x;
						dragOffsetY = unscaledMouseY - platform.y;
						canvas.style.cursor = "grabbing";
						return;
					}
				}

				if (!isDragging && character.isOnPlatform && movesLeft > 0) {
					isJumpPreviewing = true;
					jumpPreviewVector.x =
						unscaledMouseX - (character.x + character.width / 2);
					jumpPreviewVector.y =
						unscaledMouseY - (character.y + character.height / 2);
					jumpPreviewMagnitude = Math.sqrt(
						jumpPreviewVector.x * jumpPreviewVector.x +
							jumpPreviewVector.y * jumpPreviewVector.y
					);
					calculateJumpPath(jumpPreviewVector, jumpPreviewMagnitude);
				}
			}

			function calculateJumpPath(vector = null, magnitude = null) {
				pathVisualization = [];
				let simX = character.x;
				let simY = character.y;
				let simVX, simVY;

				if (vector && magnitude !== null && magnitude > 0) {
					const jumpStrength = Math.min(magnitude / 15, 12);
					simVX = (vector.x / magnitude) * jumpStrength;
					simVY = (vector.y / magnitude) * jumpStrength;
				} else {
					simVX = character.vx;
					simVY = character.vy;
				}

				for (let i = 0; i < 120 / JUMP_ANIMATION_SPEED; i++) {
					pathVisualization.push({ x: simX, y: simY });
					simVY += GRAVITY * JUMP_ANIMATION_SPEED;
					simX += simVX * JUMP_ANIMATION_SPEED;
					simY += simVY * JUMP_ANIMATION_SPEED;

					let landed = false;
					for (const platform of [...platforms, ...fixedPlatforms]) {
						if (
							simY + character.height > platform.y &&
							simY + character.height <
								platform.y + platform.height + simVY + 1 &&
							simX + character.width > platform.x &&
							simX < platform.x + platform.width
						) {
							simY = platform.y - character.height;
							simVY = 0;
							landed = true;
							break;
						}
					}

					if (landed) simVX *= 0.9;

					if (
						simY + character.height >= INITIAL_WATER_LEVEL ||
						simX <= 0 ||
						simX + character.width >= INITIAL_CANVAS_WIDTH
					) {
						pathVisualization.push({ x: simX, y: simY });
						break;
					}
					if (Math.abs(simVX) < 0.01 && Math.abs(simVY) < GRAVITY && landed) {
						pathVisualization.push({ x: simX, y: simY });
						break;
					}
				}
			}

			function handleMouseMove(e) {
				if (isDragging && selectedPlatform) {
					const { x: mouseCanvasX, y: mouseCanvasY } = getCanvasRelativeCoords(
						e,
						canvas
					);

					const unscaledMouseX = mouseCanvasX / scaleFactor;
					const unscaledMouseY = mouseCanvasY / scaleFactor;

					selectedPlatform.x = unscaledMouseX - dragOffsetX;
					selectedPlatform.y = unscaledMouseY - dragOffsetY;

					const maxY = INITIAL_WATER_LEVEL;
					selectedPlatform.x = Math.max(
						0,
						Math.min(
							selectedPlatform.x,
							INITIAL_CANVAS_WIDTH - selectedPlatform.width
						)
					);
					selectedPlatform.y = Math.max(0, Math.min(selectedPlatform.y, maxY));
					return;
				}

				if (isJumpPreviewing) {
					const { x: mouseCanvasX, y: mouseCanvasY } = getCanvasRelativeCoords(
						e,
						canvas
					);
					const unscaledMouseX = mouseCanvasX / scaleFactor;
					const unscaledMouseY = mouseCanvasY / scaleFactor;
					jumpPreviewVector.x =
						unscaledMouseX - (character.x + character.width / 2);
					jumpPreviewVector.y =
						unscaledMouseY - (character.y + character.height / 2);
					jumpPreviewMagnitude = Math.sqrt(
						jumpPreviewVector.x * jumpPreviewVector.x +
							jumpPreviewVector.y * jumpPreviewVector.y
					);
					calculateJumpPath(jumpPreviewVector, jumpPreviewMagnitude);
				}
			}

			function handleMouseUp() {
				if (isDragging) {
					isDragging = false;
					selectedPlatform = null;
					canvas.style.cursor = "default";
					saveGameState();
				}

				if (isJumpPreviewing && movesLeft > 0 && character.isOnPlatform) {
					isJumpPreviewing = false;

					if (jumpPreviewMagnitude > 0) {
						const jumpStrength = Math.min(jumpPreviewMagnitude / 15, 12);
						character.vx =
							(jumpPreviewVector.x / jumpPreviewMagnitude) * jumpStrength;
						character.vy =
							(jumpPreviewVector.y / jumpPreviewMagnitude) * jumpStrength;
						character.isJumping = true;

						calculateJumpPath();

						movesLeft--;
						document.getElementById("moves-left").textContent = movesLeft;
						saveGameState();
					}
					pathVisualization = [];
				}
			}

			function saveGameState() {
				const characterCopy = { ...character };
				const platformsCopy = platforms.map((p) => ({ ...p }));

				if (historyIndex < gameHistory.length - 1) {
					gameHistory = gameHistory.slice(0, historyIndex + 1);
				}

				gameHistory.push({
					character: characterCopy,
					platforms: platformsCopy,
					movesLeft: movesLeft,
					isGameOver: isGameOver,
					isGameWon: isGameWon,
				});

				historyIndex = gameHistory.length - 1;

				document.getElementById("undo-btn").disabled = historyIndex <= 0;
				document.getElementById("redo-btn").disabled =
					historyIndex >= gameHistory.length - 1;
			}

			function loadGameState(state) {
				character = { ...state.character };
				platforms = state.platforms.map((p) => ({ ...p }));
				movesLeft = state.movesLeft;
				isGameOver = state.isGameOver;
				isGameWon = state.isGameWon;

				document.getElementById("moves-left").textContent = movesLeft;
				document.getElementById("undo-btn").disabled = historyIndex <= 0;
				document.getElementById("redo-btn").disabled =
					historyIndex >= gameHistory.length - 1;

				pathVisualization = [];
				if (isGameOver || isGameWon) {
					if (isGameWon)
						showMessage("Congratulations! You crossed the river!", "win");
					else showMessage("Game Over! You ran out of moves.", "lose");
				} else {
					hideMessage();
				}
				render();
			}

			function undo() {
				if (historyIndex > 0) {
					historyIndex--;
					loadGameState(gameHistory[historyIndex]);
				}
			}

			function redo() {
				if (historyIndex < gameHistory.length - 1) {
					historyIndex++;
					loadGameState(gameHistory[historyIndex]);
				}
			}

			function restart() {
				gameHistory = [];
				historyIndex = -1;
				movesLeft = MAX_MOVES;
				initializeGame();
			}
		</script>
	</body>
</html>
