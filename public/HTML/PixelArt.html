<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pixel Sprite Animator</title>

		<script src="https://cdn.tailwindcss.com"></script>

		<script src="https://cdn.jsdelivr.net/gh/antimatter15/jsgif@master/LZWEncoder.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/antimatter15/jsgif@master/NeuQuant.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/antimatter15/jsgif@master/GIFEncoder.js"></script>
		<script src="https://cdn.jsdelivr.net/gh/antimatter15/jsgif@master/b64.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

		<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							"orange-50": "#FFF9F5",
							"orange-100": "#FFF0E6",
							"orange-200": "#FFDFCC",
							"orange-300": "#FFCEA6",
							"orange-400": "#FFBB80",
							"orange-500": "#FF9933",
							"orange-600": "#E67300",
							"orange-700": "#B35900",
							"orange-800": "#804000",
							"orange-900": "#663300",
						},
						boxShadow: {
							neumorph: "5px 5px 10px #d9d9d9, -5px -5px 10px #ffffff",
							"neumorph-sm": "3px 3px 6px #d9d9d9, -3px -3px 6px #ffffff",
							"neumorph-inset":
								"inset 2px 2px 5px #d9d9d9, inset -2px -2px 5px #ffffff",
							"neumorph-pressed":
								"inset 3px 3px 7px #d9d9d9, inset -3px -3px 7px #ffffff",
						},
					},
				},
				plugins: [],
			};
		</script>
		<style>
			* {
				transition: all 0.2s ease;
				-webkit-tap-highlight-color: transparent;
			}
			.container {
				max-width: 100vw !important;
				overflow-x: hidden;
			}

			#timelineContainer {
				max-width: 100%;
				overflow-x: auto;
			}
			body {
				touch-action: manipulation;
				overscroll-behavior: none;
				background-color: #fff9f5;
				background-image: radial-gradient(#ff9933 0.5px, transparent 0.5px),
					radial-gradient(#ff9933 0.5px, #fff9f5 0.5px);
				background-size: 20px 20px;
				background-position: 0 0, 10px 10px;
				background-attachment: fixed;
			}

			@keyframes pulse {
				0% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.05);
				}
				100% {
					transform: scale(1);
				}
			}

			@keyframes fade-in {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes spin {
				from {
					transform: rotate(0deg);
				}
				to {
					transform: rotate(360deg);
				}
			}

			.animate-pulse-slow {
				animation: pulse 2s infinite ease-in-out;
			}

			.animate-fade-in {
				animation: fade-in 0.3s ease-out forwards;
			}

			.animate-spin-slow {
				animation: spin 3s linear infinite;
			}

			.pixel {
				border: 0.5px solid rgba(0, 0, 0, 0.05);
				transition: background-color 0.1s ease;
			}

			.pixel:hover {
				border-color: rgba(255, 153, 51, 0.3);
			}

			.onion-skin {
				opacity: 0.3;
			}

			::-webkit-scrollbar {
				width: 8px;
				height: 8px;
			}

			::-webkit-scrollbar-track {
				background: #fff9f5;
				border-radius: 10px;
			}

			::-webkit-scrollbar-thumb {
				background: #ffbb80;
				border-radius: 10px;
			}

			::-webkit-scrollbar-thumb:hover {
				background: #ff9933;
			}

			.neumorph {
				border-radius: 16px;
				background: #fff9f5;
				box-shadow: 5px 5px 10px #d9d9d9, -5px -5px 10px #ffffff;
			}

			.neumorph-inset {
				border-radius: 16px;
				background: #fff9f5;
				box-shadow: inset 2px 2px 5px #d9d9d9, inset -2px -2px 5px #ffffff;
			}

			.neumorph-btn {
				border-radius: 12px;
				background: #fff9f5;
				box-shadow: 3px 3px 6px #d9d9d9, -3px -3px 6px #ffffff;
				transition: all 0.2s ease;
			}

			.neumorph-btn:active,
			.neumorph-btn.active {
				box-shadow: inset 3px 3px 7px #d9d9d9, inset -3px -3px 7px #ffffff;
				transform: translateY(1px);
			}

			.neumorph-btn:hover:not(:active):not(.active) {
				transform: translateY(-1px);
				box-shadow: 4px 4px 8px #d9d9d9, -4px -4px 8px #ffffff;
			}

			.toggle-switch {
				position: relative;
				display: inline-block;
				width: 40px;
				height: 22px;
			}

			.toggle-switch input {
				opacity: 0;
				width: 0;
				height: 0;
			}

			.toggle-slider {
				position: absolute;
				cursor: pointer;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background-color: #ffe0cc;
				transition: 0.3s;
				border-radius: 34px;
			}

			.toggle-slider:before {
				position: absolute;
				content: "";
				height: 16px;
				width: 16px;
				left: 3px;
				bottom: 3px;
				background-color: white;
				transition: 0.3s;
				border-radius: 50%;
			}

			input:checked + .toggle-slider {
				background-color: #ff9933;
			}

			input:checked + .toggle-slider:before {
				transform: translateX(18px);
			}
			#animationPreview {
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			#animationPreview > div {
				flex-shrink: 0;
			}
			.timeline-frame {
				width: 40px;
				height: 40px;
				margin: 0 5px;
				border-radius: 8px;
				cursor: pointer;
				transition: all 0.2s ease;
				position: relative;
				background-color: #fff9f5;
				flex-shrink: 0;
			}

			.timeline-frame.active {
				border: 2px solid #ff9933;
				transform: translateY(-4px);
			}

			.timeline-frame:not(.active):hover {
				transform: translateY(-2px);
			}

			.timeline-preview {
				width: 100%;
				height: 100%;
				border-radius: 6px;
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			#pixelCanvas {
				touch-action: none;
			}

			.grid-cols-32 {
				grid-template-columns: repeat(32, 1fr);
			}

			.modal-overlay {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background-color: rgba(0, 0, 0, 0.5);
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 50;
				opacity: 0;
				visibility: hidden;
				transition: all 0.3s ease;
				padding: 1rem;
			}

			.modal-overlay.active {
				opacity: 1;
				visibility: visible;
			}

			.modal-content {
				max-width: calc(100vw - 2rem);
				max-height: calc(100vh - 2rem);
				width: 100%;
				overflow: auto;
				transform: translateY(20px);
				transition: all 0.3s ease;
			}

			.modal-overlay.active .modal-content {
				transform: translateY(0);
			}

			.tooltip {
				position: relative;
				display: inline-block;
			}

			.tooltip .tooltip-text {
				visibility: hidden;
				width: 120px;
				background-color: #ff9933;
				color: white;
				text-align: center;
				border-radius: 6px;
				padding: 5px;
				position: absolute;
				z-index: 10;
				bottom: 125%;
				left: 50%;
				margin-left: -60px;
				opacity: 0;
				transition: opacity 0.3s;
			}

			.tooltip .tooltip-text::after {
				content: "";
				position: absolute;
				top: 100%;
				left: 50%;
				margin-left: -5px;
				border-width: 5px;
				border-style: solid;
				border-color: #ff9933 transparent transparent transparent;
			}

			.tooltip:hover .tooltip-text {
				visibility: visible;
				opacity: 1;
			}

			.loading-spinner {
				width: 40px;
				height: 40px;
				border: 4px solid rgba(255, 153, 51, 0.3);
				border-radius: 50%;
				border-top: 4px solid #ff9933;
				animation: spin 1s linear infinite;
			}

			input[type="range"] {
				-webkit-appearance: none;
				width: 100%;
				height: 8px;
				border-radius: 5px;
				background: #ffe0cc;
				outline: none;
				opacity: 0.7;
				transition: opacity 0.2s;
			}

			input[type="range"]:hover {
				opacity: 1;
			}

			input[type="range"]::-webkit-slider-thumb {
				-webkit-appearance: none;
				appearance: none;
				width: 20px;
				height: 20px;
				border-radius: 50%;
				background: #ff9933;
				cursor: pointer;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
			}

			input[type="range"]::-moz-range-thumb {
				width: 20px;
				height: 20px;
				border-radius: 50%;
				background: #ff9933;
				cursor: pointer;
				box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
				border: none;
			}

			.mini-preview-container {
				width: 18px;
				height: 18px;
				overflow: hidden;
				border-radius: 3px;
				background: white;
				border: 1px solid #e5e5e5;
			}

			.mini-preview-grid {
				width: 100%;
				height: 100%;
				display: grid;
				grid-template-columns: repeat(8, 1fr);
				gap: 0;
			}

			.mini-preview-pixel {
				width: 100%;
				height: 100%;
				background: white;
			}

			@media (max-width: 640px) {
				.neumorph,
				.neumorph-inset {
					border-radius: 12px;
				}

				.neumorph-btn {
					border-radius: 8px;
				}

				.timeline-frame {
					width: 36px;
					height: 36px;
					margin: 0 3px;
				}

				.modal-content {
					max-width: calc(100vw - 1rem);
					margin: 0.5rem;
				}
			}

			@media (max-width: 370px) {
				.timeline-frame {
					width: 32px;
					height: 32px;
					margin: 0 2px;
				}

				.xs-text-xs {
					font-size: 0.75rem;
					line-height: 1rem;
				}

				.modal-overlay {
					padding: 0.5rem;
				}

				.modal-content {
					max-width: calc(100vw - 1rem);
				}
			}
		</style>
	</head>

	<body class="font-sans text-gray-800 min-h-screen flex flex-col">
		<header
			class="bg-gradient-to-r from-orange-500 to-orange-600 text-white shadow-lg z-10 sticky top-0"
		>
			<div
				class="container mx-auto px-4 py-3 flex flex-wrap justify-between items-center"
			>
				<div class="flex items-center space-x-2">
					<div
						class="h-8 w-8 bg-white rounded-lg flex items-center justify-center"
					>
						<iconify-icon
							icon="mdi:pencil-ruler"
							style="color: #ff9933"
							width="20"
							height="20"
						></iconify-icon>
					</div>
					<h1 class="text-xl font-bold">PixelMate</h1>
				</div>

				<div class="flex space-x-2 mt-0">
					<button
						id="saveBtn"
						class="flex items-center space-x-1 bg-white text-orange-600 px-3 py-2 rounded-lg text-sm font-medium hover:bg-orange-50 transition shadow-md"
					>
						<iconify-icon
							icon="mdi:content-save"
							width="18"
							height="18"
						></iconify-icon>
						<span class="hidden sm:inline">Save GIF</span>
					</button>
					<button
						id="newProjectBtn"
						class="flex items-center space-x-1 bg-white text-orange-600 px-3 py-2 rounded-lg text-sm font-medium hover:bg-orange-50 transition shadow-md"
					>
						<iconify-icon
							icon="mdi:file-plus"
							width="18"
							height="18"
						></iconify-icon>
						<span class="hidden sm:inline">New</span>
					</button>
				</div>
			</div>
		</header>

		<main class="flex-1 container mx-auto p-3 md:p-6 flex flex-col">
			<div class="neumorph p-3 md:p-4 mb-4 animate-fade-in">
				<div class="flex justify-center mb-3">
					<div
						id="canvasContainer"
						class="relative neumorph-inset p-1 md:p-2 overflow-hidden"
					>
						<div id="pixelCanvas" class="grid grid-cols-32 gap-0"></div>
						<div
							id="onionSkinLayer"
							class="absolute top-0 left-0 pointer-events-none hidden"
						></div>

						<div
							class="absolute bottom-1 right-1 bg-orange-100 text-orange-700 text-xs px-1 rounded opacity-70"
						>
							32×32
						</div>
					</div>
				</div>

				<div class="flex border-b border-orange-200 mb-3">
					<button
						class="tab-btn px-3 py-2 text-sm font-medium text-orange-600 border-b-2 border-orange-500"
						data-tab="tools"
					>
						<iconify-icon icon="mdi:palette" inline></iconify-icon> Tools
					</button>
					<button
						class="tab-btn px-3 py-2 text-sm font-medium text-gray-500"
						data-tab="animation"
					>
						<iconify-icon icon="mdi:animation" inline></iconify-icon> Animation
					</button>
				</div>

				<div class="tab-content" id="tools-tab">
					<div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
						<div class="neumorph-inset p-2">
							<h3 class="text-orange-700 font-medium text-sm mb-2">Color</h3>
							<div class="flex flex-wrap gap-2">
								<input
									type="color"
									id="colorPicker"
									value="#000000"
									class="w-full h-10 rounded cursor-pointer mb-2"
								/>

								<div class="w-full flex flex-wrap gap-1">
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #000000"
										data-color="#000000"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #ffffff"
										data-color="#FFFFFF"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #ff0000"
										data-color="#FF0000"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #00ff00"
										data-color="#00FF00"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #0000ff"
										data-color="#0000FF"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #ffff00"
										data-color="#FFFF00"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #ff00ff"
										data-color="#FF00FF"
									></div>
									<div
										class="color-swatch w-6 h-6 rounded-full cursor-pointer border border-gray-300"
										style="background-color: #00ffff"
										data-color="#00FFFF"
									></div>
								</div>
							</div>
						</div>

						<div class="neumorph-inset p-2">
							<h3 class="text-orange-700 font-medium text-sm mb-2">Brush</h3>
							<div class="flex flex-wrap gap-2">
								<div class="w-full flex justify-between">
									<button
										class="brush-btn neumorph-btn px-2 py-1 text-xs active"
										data-size="1"
									>
										<iconify-icon
											icon="mdi:circle-small"
											width="20"
											height="20"
										></iconify-icon>
									</button>
									<button
										class="brush-btn neumorph-btn px-2 py-1 text-xs"
										data-size="2"
									>
										<iconify-icon
											icon="mdi:circle-medium"
											width="20"
											height="20"
										></iconify-icon>
									</button>
									<button
										class="brush-btn neumorph-btn px-2 py-1 text-xs"
										data-size="3"
									>
										<iconify-icon
											icon="mdi:circle"
											width="20"
											height="20"
										></iconify-icon>
									</button>
								</div>
								<button
									id="eraserBtn"
									class="neumorph-btn px-2 py-1 text-xs w-full flex items-center justify-center"
								>
									<iconify-icon
										icon="mdi:eraser"
										width="16"
										height="16"
									></iconify-icon>
									<span class="ml-1">Eraser</span>
								</button>
								<button
									id="fillBtn"
									class="neumorph-btn px-2 py-1 text-xs w-full flex items-center justify-center"
								>
									<iconify-icon
										icon="mdi:format-color-fill"
										width="16"
										height="16"
									></iconify-icon>
									<span class="ml-1">Fill</span>
								</button>
							</div>
						</div>

						<div class="neumorph-inset p-2 col-span-2 sm:col-span-1">
							<h3 class="text-orange-700 font-medium text-sm mb-2">Actions</h3>
							<div class="grid grid-cols-2 gap-2">
								<button
									id="undoBtn"
									class="neumorph-btn px-2 py-1 text-xs flex items-center justify-center tooltip"
								>
									<iconify-icon
										icon="mdi:undo"
										width="16"
										height="16"
									></iconify-icon>
									<span class="tooltip-text">Undo</span>
								</button>
								<button
									id="redoBtn"
									class="neumorph-btn px-2 py-1 text-xs flex items-center justify-center tooltip"
								>
									<iconify-icon
										icon="mdi:redo"
										width="16"
										height="16"
									></iconify-icon>
									<span class="tooltip-text">Redo</span>
								</button>
								<button
									id="clearBtn"
									class="neumorph-btn px-2 py-1 text-xs flex items-center justify-center tooltip"
								>
									<iconify-icon
										icon="mdi:delete"
										width="16"
										height="16"
									></iconify-icon>
									<span class="tooltip-text">Clear Frame</span>
								</button>
								<button
									id="gridToggleBtn"
									class="neumorph-btn px-2 py-1 text-xs flex items-center justify-center tooltip"
								>
									<iconify-icon
										icon="mdi:grid"
										width="16"
										height="16"
									></iconify-icon>
									<span class="tooltip-text">Toggle Grid</span>
								</button>
							</div>
						</div>
					</div>
				</div>

				<div class="tab-content hidden" id="animation-tab">
					<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
						<div class="neumorph-inset p-2">
							<h3 class="text-orange-700 font-medium text-sm mb-2">Playback</h3>
							<div class="flex flex-wrap gap-2">
								<div class="w-full flex space-x-2">
									<button
										id="playBtn"
										class="neumorph-btn flex-1 px-2 py-1 text-xs flex items-center justify-center"
									>
										<iconify-icon
											icon="mdi:play"
											width="16"
											height="16"
										></iconify-icon>
										<span class="ml-1">Play</span>
									</button>
									<button
										id="stopBtn"
										class="neumorph-btn flex-1 px-2 py-1 text-xs flex items-center justify-center"
									>
										<iconify-icon
											icon="mdi:stop"
											width="16"
											height="16"
										></iconify-icon>
										<span class="ml-1">Stop</span>
									</button>
								</div>

								<div class="w-full">
									<label
										for="fpsSlider"
										class="block text-xs text-gray-600 mb-1"
									>
										Speed: <span id="fpsValue">12</span> FPS
									</label>
									<input
										type="range"
										id="fpsSlider"
										min="1"
										max="24"
										value="12"
										class="w-full"
									/>
								</div>
							</div>
						</div>

						<div class="neumorph-inset p-2">
							<h3 class="text-orange-700 font-medium text-sm mb-2">Options</h3>
							<div class="flex flex-col space-y-3">
								<div class="flex items-center justify-between">
									<label for="onionSkinToggle" class="text-xs text-gray-600"
										>Onion Skin</label
									>
									<label class="toggle-switch">
										<input type="checkbox" id="onionSkinToggle" />
										<span class="toggle-slider"></span>
									</label>
								</div>
								<div class="flex items-center justify-between">
									<label for="loopToggle" class="text-xs text-gray-600"
										>Loop Animation</label
									>
									<label class="toggle-switch">
										<input type="checkbox" id="loopToggle" checked />
										<span class="toggle-slider"></span>

		<script>
			document.addEventListener("DOMContentLoaded", function () {
				const GRID_SIZE = 32;
				const MAX_FRAMES = 8;
				const DEFAULT_COLOR = "#000000";
				const TRANSPARENT_COLOR = "";

				let currentColor = DEFAULT_COLOR;
				let currentBrushSize = 1;
				let currentFrame = 0;
				let frames = [];
				let undoStack = [];
				let redoStack = [];
				let isDrawing = false;
				let isErasing = false;
				let isFilling = false;
				let showGrid = true;
				let fps = 12;
				let animationInterval = null;
				let onionSkinEnabled = false;
				let loopAnimation = true;
				let isHistoryAction = false;

				const pixelCanvas = document.getElementById("pixelCanvas");
				const onionSkinLayer = document.getElementById("onionSkinLayer");
				const timelineContainer = document.getElementById("timelineContainer");
				const animationPreview = document.getElementById("animationPreview");
				const colorPicker = document.getElementById("colorPicker");
				const colorSwatches = document.querySelectorAll(".color-swatch");
				const brushButtons = document.querySelectorAll(".brush-btn");
				const eraserBtn = document.getElementById("eraserBtn");
				const fillBtn = document.getElementById("fillBtn");
				const undoBtn = document.getElementById("undoBtn");
				const redoBtn = document.getElementById("redoBtn");
				const gridToggleBtn = document.getElementById("gridToggleBtn");
				const playBtn = document.getElementById("playBtn");
				const stopBtn = document.getElementById("stopBtn");
				const fpsSlider = document.getElementById("fpsSlider");
				const fpsValue = document.getElementById("fpsValue");
				const onionSkinToggle = document.getElementById("onionSkinToggle");
				const loopToggle = document.getElementById("loopToggle");
				const addFrameBtn = document.getElementById("addFrameBtn");
				const duplicateFrameBtn = document.getElementById("duplicateFrameBtn");
				const deleteFrameBtn = document.getElementById("deleteFrameBtn");
				const currentFrameNum = document.getElementById("currentFrameNum");
				const totalFrames = document.getElementById("totalFrames");
				const saveBtn = document.getElementById("saveBtn");
				const clearBtn = document.getElementById("clearBtn");
				const newProjectBtn = document.getElementById("newProjectBtn");
				const tabButtons = document.querySelectorAll(".tab-btn");
				const tabContents = document.querySelectorAll(".tab-content");

				const confirmModal = document.getElementById("confirmModal");
				const confirmTitle = document.getElementById("confirmTitle");
				const confirmMessage = document.getElementById("confirmMessage");
				const confirmBtn = document.getElementById("confirmBtn");
				const cancelBtn = document.getElementById("cancelBtn");
				const alertModal = document.getElementById("alertModal");
				const alertIcon = document.getElementById("alertIcon");
				const alertTitle = document.getElementById("alertTitle");
				const alertMessage = document.getElementById("alertMessage");
				const alertCloseBtn = document.getElementById("alertCloseBtn");
				const loadingModal = document.getElementById("loadingModal");
				const loadingMessage = document.getElementById("loadingMessage");

				function init() {
					createPixelGrid();
					initializeFrames();
					setupEventListeners();
					updateUI();
				}

				function createPixelGrid() {
					pixelCanvas.innerHTML = "";
					pixelCanvas.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;

					const containerSize = Math.min(window.innerWidth - 40, 400);
					pixelCanvas.style.width = `${containerSize}px`;
					pixelCanvas.style.height = `${containerSize}px`;

					for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
						const pixel = document.createElement("div");
						pixel.className = `pixel bg-white ${
							showGrid ? "border-opacity-100" : "border-opacity-0"
						}`;
						pixel.dataset.index = i;
						pixelCanvas.appendChild(pixel);
					}

					onionSkinLayer.innerHTML = pixelCanvas.innerHTML;
					onionSkinLayer.style.width = pixelCanvas.style.width;
					onionSkinLayer.style.height = pixelCanvas.style.height;
					onionSkinLayer.style.gridTemplateColumns =
						pixelCanvas.style.gridTemplateColumns;
					onionSkinLayer.className =
						"grid grid-cols-32 gap-0 absolute top-0 left-0 pointer-events-none onion-skin";
				}

				function initializeFrames() {
					frames = [];
					undoStack = [];
					redoStack = [];

					for (let i = 0; i < MAX_FRAMES; i++) {
						const frameData = Array(GRID_SIZE * GRID_SIZE).fill(
							TRANSPARENT_COLOR
						);
						frames.push(frameData);
					}

					currentFrame = 0;
					renderFrameToCanvas(currentFrame);
					createTimelineFrames();
					saveToHistory();
				}

				function createTimelineFrames() {
					timelineContainer.innerHTML = "";

					for (let i = 0; i < MAX_FRAMES; i++) {
						const frameThumb = document.createElement("div");
						frameThumb.className = `timeline-frame neumorph-inset flex flex-col items-center justify-center ${
							i === currentFrame ? "active" : ""
						}`;
						frameThumb.dataset.frameIndex = i;

						const frameNumber = document.createElement("div");
						frameNumber.className = "text-xs font-medium text-orange-700 mb-1";
						frameNumber.textContent = i + 1;
						frameThumb.appendChild(frameNumber);

						frameThumb.addEventListener("click", () => {
							currentFrame = parseInt(frameThumb.dataset.frameIndex);
							updateUI();
						});

						timelineContainer.appendChild(frameThumb);
					}

					updateTimelinePreviews();
				}

				function updateTimelinePreviews() {
					for (let i = 0; i < MAX_FRAMES; i++) {
						const preview = document.getElementById(`frame-preview-${i}`);
						if (preview) {
							preview.innerHTML = "";

							const miniGrid = document.createElement("div");
							miniGrid.className = "mini-preview-grid";

							const sampleRate = 4;
							for (let y = 0; y < GRID_SIZE; y += sampleRate) {
								for (let x = 0; x < GRID_SIZE; x += sampleRate) {
									const index = y * GRID_SIZE + x;
									const miniPixel = document.createElement("div");
									miniPixel.className = "mini-preview-pixel";
									const color = frames[i][index];
									miniPixel.style.backgroundColor = color || "white";
									miniGrid.appendChild(miniPixel);
								}
							}

							preview.appendChild(miniGrid);
						}
					}
				}

				function updateAnimationPreview() {
					animationPreview.innerHTML = "";

					const containerSize = 80;
					const baseSize = 32;
					const pixelSize = 1;
					const scale = containerSize / baseSize;

					const previewCanvas = document.createElement("div");
					previewCanvas.style.display = "grid";
					previewCanvas.style.gridTemplateColumns = `repeat(${GRID_SIZE}, ${pixelSize}px)`;
					previewCanvas.style.gridTemplateRows = `repeat(${GRID_SIZE}, ${pixelSize}px)`;
					previewCanvas.style.width = `${baseSize}px`;
					previewCanvas.style.height = `${baseSize}px`;
					previewCanvas.style.gap = "0";
					previewCanvas.style.transform = `scale(${scale})`;
					previewCanvas.style.transformOrigin = "center";
					previewCanvas.style.imageRendering = "pixelated";
					previewCanvas.style.imageRendering = "-moz-crisp-edges";
					previewCanvas.style.imageRendering = "crisp-edges";

					for (let y = 0; y < GRID_SIZE; y++) {
						for (let x = 0; x < GRID_SIZE; x++) {
							const index = y * GRID_SIZE + x;
							const previewPixel = document.createElement("div");
							previewPixel.style.width = `${pixelSize}px`;
							previewPixel.style.height = `${pixelSize}px`;
							previewPixel.style.backgroundColor =
								frames[currentFrame][index] || "white";
							previewCanvas.appendChild(previewPixel);
						}
					}

					animationPreview.appendChild(previewCanvas);
				}
				function renderFrameToCanvas(frameIndex) {
					const frameData = frames[frameIndex];
					const pixels = pixelCanvas.querySelectorAll(".pixel");

					pixels.forEach((pixel, index) => {
						if (frameData[index]) {
							pixel.style.backgroundColor = frameData[index];
						} else {
							pixel.style.backgroundColor = "white";
						}
					});

					updateAnimationPreview();
				}

				function updateOnionSkinLayer() {
					if (!onionSkinEnabled) {
						onionSkinLayer.classList.add("hidden");
						return;
					}

					const prevFrameIndex =
						currentFrame > 0 ? currentFrame - 1 : MAX_FRAMES - 1;
					const prevFrameData = frames[prevFrameIndex];

					onionSkinLayer.classList.remove("hidden");
					const onionPixels = onionSkinLayer.querySelectorAll(".pixel");

					onionPixels.forEach((pixel, index) => {
						if (prevFrameData[index]) {
							pixel.style.backgroundColor = prevFrameData[index];
						} else {
							pixel.style.backgroundColor = "transparent";
						}
					});
				}

				function saveToHistory() {
					if (isHistoryAction) return;

					const framesClone = frames.map((frame) => [...frame]);

					undoStack.push({
						frames: framesClone,
						currentFrame: currentFrame,
					});

					redoStack = [];

					if (undoStack.length > 30) {
						undoStack.shift();
					}

					updateUndoRedoButtons();
				}

				function updateUndoRedoButtons() {
					undoBtn.classList.toggle("opacity-50", undoStack.length === 0);
					redoBtn.classList.toggle("opacity-50", redoStack.length === 0);
				}

				function undo() {
					if (undoStack.length === 0) return;

					const framesClone = frames.map((frame) => [...frame]);
					redoStack.push({
						frames: framesClone,
						currentFrame: currentFrame,
					});

					const prevState = undoStack.pop();
					isHistoryAction = true;
					frames = prevState.frames.map((frame) => [...frame]);
					currentFrame = prevState.currentFrame;

					renderFrameToCanvas(currentFrame);
					updateTimelinePreviews();
					updateAnimationPreview();
					updateUI();
					isHistoryAction = false;

					updateUndoRedoButtons();
				}

				function redo() {
					if (redoStack.length === 0) return;

					const framesClone = frames.map((frame) => [...frame]);
					undoStack.push({
						frames: framesClone,
						currentFrame: currentFrame,
					});

					const nextState = redoStack.pop();
					isHistoryAction = true;
					frames = nextState.frames.map((frame) => [...frame]);
					currentFrame = nextState.currentFrame;

					renderFrameToCanvas(currentFrame);
					updateTimelinePreviews();
					updateAnimationPreview();
					updateUI();
					isHistoryAction = false;

					updateUndoRedoButtons();
				}

				function drawPixel(index, color) {
					const frameData = frames[currentFrame];

					if (
						(isErasing && frameData[index] === TRANSPARENT_COLOR) ||
						(!isErasing && frameData[index] === color)
					) {
						return false;
					}

					if (isErasing) {
						frameData[index] = TRANSPARENT_COLOR;
					} else {
						frameData[index] = color;
					}

					const pixels = pixelCanvas.querySelectorAll(".pixel");
					if (isErasing) {
						pixels[index].style.backgroundColor = "white";
					} else {
						pixels[index].style.backgroundColor = color;
					}
					return true;
				}

				function fillArea(startIndex, fillColor) {
					const frameData = frames[currentFrame];
					const targetColor = frameData[startIndex] || TRANSPARENT_COLOR;

					if (targetColor === fillColor) return false;

					const queue = [startIndex];
					const visited = new Set();
					let changesMade = false;

					const getAdjacentIndices = (index) => {
						const x = index % GRID_SIZE;
						const y = Math.floor(index / GRID_SIZE);
						const adjacent = [];

						if (y > 0) adjacent.push(index - GRID_SIZE);
						if (y < GRID_SIZE - 1) adjacent.push(index + GRID_SIZE);
						if (x > 0) adjacent.push(index - 1);
						if (x < GRID_SIZE - 1) adjacent.push(index + 1);

						return adjacent;
					};

					while (queue.length > 0) {
						const index = queue.shift();

						if (visited.has(index)) continue;
						visited.add(index);

						const color = frameData[index] || TRANSPARENT_COLOR;
						if (color !== targetColor) continue;

						const pixelChanged = drawPixel(index, fillColor);
						if (pixelChanged) changesMade = true;

						const adjacent = getAdjacentIndices(index);
						queue.push(...adjacent);
					}

					return changesMade;
				}

				function handleBrush(index) {
					let changesMade = false;

					if (isFilling) {
						changesMade = fillArea(index, currentColor);
						return changesMade;
					}

					const x = index % GRID_SIZE;
					const y = Math.floor(index / GRID_SIZE);

					const pixelChanged = drawPixel(index, currentColor);
					if (pixelChanged) changesMade = true;

					if (currentBrushSize >= 2) {
						if (y > 0) {
							const changed = drawPixel(index - GRID_SIZE, currentColor);
							if (changed) changesMade = true;
						}
						if (y < GRID_SIZE - 1) {
							const changed = drawPixel(index + GRID_SIZE, currentColor);
							if (changed) changesMade = true;
						}
						if (x > 0) {
							const changed = drawPixel(index - 1, currentColor);
							if (changed) changesMade = true;
						}
						if (x < GRID_SIZE - 1) {
							const changed = drawPixel(index + 1, currentColor);
							if (changed) changesMade = true;
						}
					}

					if (currentBrushSize >= 3) {
						if (x > 0 && y > 0) {
							const changed = drawPixel(index - GRID_SIZE - 1, currentColor);
							if (changed) changesMade = true;
						}
						if (x < GRID_SIZE - 1 && y > 0) {
							const changed = drawPixel(index - GRID_SIZE + 1, currentColor);
							if (changed) changesMade = true;
						}
						if (x > 0 && y < GRID_SIZE - 1) {
							const changed = drawPixel(index + GRID_SIZE - 1, currentColor);
							if (changed) changesMade = true;
						}
						if (x < GRID_SIZE - 1 && y < GRID_SIZE - 1) {
							const changed = drawPixel(index + GRID_SIZE + 1, currentColor);
							if (changed) changesMade = true;
						}
					}

					return changesMade;
				}

				function toggleGrid() {
					showGrid = !showGrid;
					const pixels = pixelCanvas.querySelectorAll(".pixel");
					pixels.forEach((pixel) => {
						if (showGrid) {
							pixel.classList.remove("border-opacity-0");
							pixel.classList.add("border-opacity-100");
						} else {
							pixel.classList.remove("border-opacity-100");
							pixel.classList.add("border-opacity-0");
						}
					});

					gridToggleBtn.classList.toggle("active", showGrid);
				}

				function updateUI() {
					const frameElements =
						timelineContainer.querySelectorAll(".timeline-frame");
					frameElements.forEach((frame, index) => {
						if (index === currentFrame) {
							frame.classList.add("active");
						} else {
							frame.classList.remove("active");
						}
					});

					currentFrameNum.textContent = currentFrame + 1;
					renderFrameToCanvas(currentFrame);
					updateOnionSkinLayer();
					updateTimelinePreviews();
					updateAnimationPreview();

					brushButtons.forEach((btn) => {
						if (parseInt(btn.dataset.size) === currentBrushSize) {
							btn.classList.add("active");
						} else {
							btn.classList.remove("active");
						}
					});

					eraserBtn.classList.toggle("active", isErasing);
					fillBtn.classList.toggle("active", isFilling);
					gridToggleBtn.classList.toggle("active", showGrid);
				}

				function playAnimation() {
					if (animationInterval) {
						stopAnimation();
						return;
					}

					playBtn.classList.add("active");
					playBtn.innerHTML =
						'<iconify-icon icon="mdi:pause" width="16" height="16"></iconify-icon><span class="ml-1">Pause</span>';

					let playFrame = 0;
					renderAnimationFrame(playFrame);

					animationInterval = setInterval(() => {
						playFrame = (playFrame + 1) % MAX_FRAMES;
						renderAnimationFrame(playFrame);

						if (!loopAnimation && playFrame === MAX_FRAMES - 1) {
							setTimeout(() => stopAnimation(), 1000 / fps);
						}
					}, 1000 / fps);
				}

				function renderAnimationFrame(frameIndex) {
					if (frameIndex > 0 && isFrameEmpty(frameIndex)) {
						return;
					}

					renderFrameToCanvas(frameIndex);
				}

				function isFrameEmpty(frameIndex) {
					return frames[frameIndex].every(
						(pixel) => pixel === TRANSPARENT_COLOR
					);
				}

				function stopAnimation() {
					if (animationInterval) {
						clearInterval(animationInterval);
						animationInterval = null;
						renderFrameToCanvas(currentFrame);

						playBtn.classList.remove("active");
						playBtn.innerHTML =
							'<iconify-icon icon="mdi:play" width="16" height="16"></iconify-icon><span class="ml-1">Play</span>';
					}
				}

				function addFrame() {
					const newFrameIndex = (currentFrame + 1) % MAX_FRAMES;
					currentFrame = newFrameIndex;
					frames[currentFrame] = Array(GRID_SIZE * GRID_SIZE).fill(
						TRANSPARENT_COLOR
					);
					updateUI();
					saveToHistory();
				}

				function duplicateFrame() {
					const newFrameIndex = (currentFrame + 1) % MAX_FRAMES;
					frames[newFrameIndex] = [...frames[currentFrame]];
					currentFrame = newFrameIndex;
					updateUI();
					saveToHistory();
				}

				function deleteFrame() {
					showConfirmModal(
						"Delete Frame",
						"Are you sure you want to clear this frame?",
						() => {
							frames[currentFrame] = Array(GRID_SIZE * GRID_SIZE).fill(
								TRANSPARENT_COLOR
							);
							updateUI();
							saveToHistory();
						}
					);
				}

				function clearAll() {
					showConfirmModal(
						"Clear All Frames",
						"Are you sure you want to clear all frames? This cannot be undone.",
						() => {
							initializeFrames();
							updateUI();
						}
					);
				}

				function newProject() {
					showConfirmModal(
						"New Project",
						"Are you sure you want to start a new project? All current work will be lost.",
						() => {
							initializeFrames();
							updateUI();
							showSuccessMessage(
								"New Project",
								"Created a new blank project successfully!"
							);
						}
					);
				}

				function saveAsGif() {
					showLoadingModal("Creating your GIF...");

					setTimeout(() => {
						try {
							const encoder = new GIFEncoder();
							encoder.setRepeat(loopAnimation ? 0 : 1);
							encoder.setDelay(Math.floor(1000 / fps));
							encoder.start();

							const activeFrames = [];
							for (let i = 0; i < MAX_FRAMES; i++) {
								if (!isFrameEmpty(i)) {
									activeFrames.push(i);
								}
							}

							if (activeFrames.length === 0) {
								activeFrames.push(0);
							}

							const canvas = document.createElement("canvas");
							const pixelSize = 8;
							canvas.width = GRID_SIZE * pixelSize;
							canvas.height = GRID_SIZE * pixelSize;
							const ctx = canvas.getContext("2d");

							activeFrames.forEach((frameIndex) => {
								ctx.fillStyle = "white";
								ctx.fillRect(0, 0, canvas.width, canvas.height);

								const frameData = frames[frameIndex];
								for (let y = 0; y < GRID_SIZE; y++) {
									for (let x = 0; x < GRID_SIZE; x++) {
										const pixelIndex = y * GRID_SIZE + x;
										const color = frameData[pixelIndex];

										if (color && color !== TRANSPARENT_COLOR) {
											ctx.fillStyle = color;
											ctx.fillRect(
												x * pixelSize,
												y * pixelSize,
												pixelSize,
												pixelSize
											);
										}
									}
								}

								encoder.addFrame(ctx);
							});

							encoder.finish();

							const binaryGif = encoder.stream().getData();
							const dataUrl = "data:image/gif;base64," + encode64(binaryGif);

							const byteCharacters = atob(dataUrl.split(",")[1]);
							const byteNumbers = new Array(byteCharacters.length);
							for (let i = 0; i < byteCharacters.length; i++) {
								byteNumbers[i] = byteCharacters.charCodeAt(i);
							}
							const byteArray = new Uint8Array(byteNumbers);
							const blob = new Blob([byteArray], { type: "image/gif" });

							saveAs(blob, "pixel-animation.gif");

							hideLoadingModal();
							showSuccessMessage("Success", "GIF saved successfully!");
						} catch (error) {
							hideLoadingModal();
							showErrorMessage(
								"Error",
								"Failed to create GIF. Please try again."
							);
							console.error("GIF creation error:", error);
						}
					}, 100);
				}

				function hexToRgb(hex) {
					const r = parseInt(hex.slice(1, 3), 16);
					const g = parseInt(hex.slice(3, 5), 16);
					const b = parseInt(hex.slice(5, 7), 16);
					return [r, g, b];
				}

				function showConfirmModal(title, message, onConfirm) {
					confirmTitle.textContent = title;
					confirmMessage.textContent = message;

					const handleConfirm = () => {
						hideConfirmModal();
						onConfirm();
					};

					const handleCancel = () => {
						hideConfirmModal();
					};

					confirmBtn.replaceWith(confirmBtn.cloneNode(true));
					cancelBtn.replaceWith(cancelBtn.cloneNode(true));

					const newConfirmBtn = document.getElementById("confirmBtn");
					const newCancelBtn = document.getElementById("cancelBtn");

					newConfirmBtn.addEventListener("click", handleConfirm);
					newCancelBtn.addEventListener("click", handleCancel);

					confirmModal.classList.add("active");
				}

				function hideConfirmModal() {
					confirmModal.classList.remove("active");
				}

				function showAlertModal(icon, title, message, type = "info") {
					alertIcon.innerHTML = "";

					const iconName =
						type === "success"
							? "check-circle"
							: type === "error"
							? "alert-circle"
							: "information";

					const iconColor =
						type === "success"
							? "#47A358"
							: type === "error"
							? "#E74C3C"
							: "#3498DB";

					alertIcon.innerHTML = `<iconify-icon icon="mdi:${iconName}" style="color: ${iconColor};" width="28" height="28"></iconify-icon>`;

					alertTitle.textContent = title;
					alertMessage.textContent = message;

					alertCloseBtn.replaceWith(alertCloseBtn.cloneNode(true));
					const newAlertCloseBtn = document.getElementById("alertCloseBtn");
					newAlertCloseBtn.addEventListener("click", hideAlertModal);

					alertModal.classList.add("active");
				}

				function hideAlertModal() {
					alertModal.classList.remove("active");
				}

				function showSuccessMessage(title, message) {
					showAlertModal("check-circle", title, message, "success");
				}

				function showErrorMessage(title, message) {
					showAlertModal("alert-circle", title, message, "error");
				}

				function showLoadingModal(message) {
					loadingMessage.textContent = message;
					loadingModal.classList.add("active");
				}

				function hideLoadingModal() {
					loadingModal.classList.remove("active");
				}

				function setupEventListeners() {
					tabButtons.forEach((button) => {
						button.addEventListener("click", () => {
							const tabId = button.dataset.tab;

							tabButtons.forEach((btn) => {
								if (btn.dataset.tab === tabId) {
									btn.classList.add("text-orange-600", "border-orange-500");
									btn.classList.remove("text-gray-500");
								} else {
									btn.classList.remove("text-orange-600", "border-orange-500");
									btn.classList.add("text-gray-500");
									btn.classList.remove("border-b-2");
								}
							});

							tabContents.forEach((content) => {
								if (content.id === `${tabId}-tab`) {
									content.classList.remove("hidden");
								} else {
									content.classList.add("hidden");
								}
							});
						});
					});

					pixelCanvas.addEventListener("mousedown", handleDrawStart);
					pixelCanvas.addEventListener("mousemove", handleDrawMove);
					window.addEventListener("mouseup", handleDrawEnd);

					pixelCanvas.addEventListener("touchstart", handleTouchStart, {
						passive: false,
					});
					pixelCanvas.addEventListener("touchmove", handleTouchMove, {
						passive: false,
					});
					pixelCanvas.addEventListener("touchend", handleDrawEnd);

					colorPicker.addEventListener("input", (e) => {
						currentColor = e.target.value;
						isErasing = false;
						isFilling = false;
						updateUI();
					});

					colorSwatches.forEach((swatch) => {
						swatch.addEventListener("click", () => {
							currentColor = swatch.dataset.color;
							colorPicker.value = currentColor;
							isErasing = false;
							isFilling = false;
							updateUI();
						});
					});

					brushButtons.forEach((btn) => {
						btn.addEventListener("click", () => {
							currentBrushSize = parseInt(btn.dataset.size);
							isErasing = false;
							isFilling = false;
							updateUI();
						});
					});

					eraserBtn.addEventListener("click", () => {
						isErasing = !isErasing;
						if (isErasing) isFilling = false;
						updateUI();
					});

					fillBtn.addEventListener("click", () => {
						isFilling = !isFilling;
						if (isFilling) isErasing = false;
						updateUI();
					});

					undoBtn.addEventListener("click", undo);
					redoBtn.addEventListener("click", redo);
					gridToggleBtn.addEventListener("click", toggleGrid);

					playBtn.addEventListener("click", playAnimation);
					stopBtn.addEventListener("click", stopAnimation);

					fpsSlider.addEventListener("input", (e) => {
						fps = parseInt(e.target.value);
						fpsValue.textContent = fps;

						if (animationInterval) {
							stopAnimation();
							playAnimation();
						}
					});

					onionSkinToggle.addEventListener("change", (e) => {
						onionSkinEnabled = e.target.checked;
						updateUI();
					});

					loopToggle.addEventListener("change", (e) => {
						loopAnimation = e.target.checked;

						if (animationInterval) {
							stopAnimation();
							playAnimation();
						}
					});

					addFrameBtn.addEventListener("click", addFrame);
					duplicateFrameBtn.addEventListener("click", duplicateFrame);
					deleteFrameBtn.addEventListener("click", deleteFrame);

					saveBtn.addEventListener("click", saveAsGif);
					clearBtn.addEventListener("click", clearAll);
					newProjectBtn.addEventListener("click", newProject);

					window.addEventListener("resize", () => {
						createPixelGrid();
						renderFrameToCanvas(currentFrame);
						updateOnionSkinLayer();
					});

					window.addEventListener("keydown", (e) => {
						if (e.ctrlKey && e.key === "z") {
							e.preventDefault();
							undo();
						}

						if (e.ctrlKey && e.key === "y") {
							e.preventDefault();
							redo();
						}

						if (e.key === "e" && !e.ctrlKey && !e.altKey && !e.metaKey) {
							e.preventDefault();
							isErasing = !isErasing;
							if (isErasing) isFilling = false;
							updateUI();
						}

						if (e.key === "b" && !e.ctrlKey && !e.altKey && !e.metaKey) {
							e.preventDefault();
							isErasing = false;
							isFilling = false;
							updateUI();
						}

						if (e.key === "g" && !e.ctrlKey && !e.altKey && !e.metaKey) {
							e.preventDefault();
							toggleGrid();
						}

						if (e.key === " " && !e.ctrlKey && !e.altKey && !e.metaKey) {
							e.preventDefault();
							if (animationInterval) {
								stopAnimation();
							} else {
								playAnimation();
							}
						}
					});
				}

				function handleDrawStart(e) {
					e.preventDefault();
					isDrawing = true;
					let changesMade = false;

					if (e.type === "mousedown") {
						const pixel = e.target;
						if (pixel.classList.contains("pixel")) {
							changesMade = handleBrush(parseInt(pixel.dataset.index));
						}
					}

					if (changesMade) {
						updateTimelinePreviews();
						updateAnimationPreview();
						saveToHistory();
					}
				}

				function handleDrawMove(e) {
					if (!isDrawing) return;
					e.preventDefault();
					let changesMade = false;

					const pixel = e.target;
					if (pixel && pixel.classList.contains("pixel")) {
						changesMade = handleBrush(parseInt(pixel.dataset.index));
					}

					if (changesMade) {
						updateTimelinePreviews();
						updateAnimationPreview();
					}
				}

				function handleTouchStart(e) {
					e.preventDefault();
					isDrawing = true;
					let changesMade = false;

					const touch = e.touches[0];
					const pixel = document.elementFromPoint(touch.clientX, touch.clientY);

					if (pixel && pixel.classList.contains("pixel")) {
						changesMade = handleBrush(parseInt(pixel.dataset.index));
					}

					if (changesMade) {
						updateTimelinePreviews();
						updateAnimationPreview();
						saveToHistory();
					}
				}

				function handleTouchMove(e) {
					if (!isDrawing) return;
					e.preventDefault();
					let changesMade = false;

					const touch = e.touches[0];
					const pixel = document.elementFromPoint(touch.clientX, touch.clientY);

					if (pixel && pixel.classList.contains("pixel")) {
						changesMade = handleBrush(parseInt(pixel.dataset.index));
					}

					if (changesMade) {
						updateTimelinePreviews();
						updateAnimationPreview();
					}
				}

				function handleDrawEnd() {
					if (isDrawing) {
						saveToHistory();
					}
					isDrawing = false;
				}

				init();
			});
		</script>
	</body>
</html>
