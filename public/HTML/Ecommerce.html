			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						fontFamily: {
							poppins: ["Poppins", "sans-serif"],
						},
						colors: {
							primary: {
								50: "#f0f9ff",
								100: "#e0f2fe",
								200: "#bae6fd",
								300: "#7dd3fc",
								400: "#38bdf8",
								500: "#0ea5e9",
								600: "#0284c7",
								700: "#0369a1",
								800: "#075985",
								900: "#0c4a6e",
							},
							secondary: {
								50: "#fdf4ff",
								100: "#fae8ff",
								200: "#f5d0fe",
								300: "#f0abfc",
								400: "#e879f9",
								500: "#d946ef",
								600: "#c026d3",
								700: "#a21caf",
								800: "#86198f",
								900: "#701a75",
							},
						},
						animation: {
							float: "float 6s ease-in-out infinite",
							"float-delay": "float 6s ease-in-out 2s infinite",
							loader: "loader 1s linear infinite",
							"pulse-shadow": "pulse-shadow 2s infinite",
							wiggle: "wiggle 1s ease-in-out infinite",
							scale: "scale 0.5s ease-in-out",
							fadeIn: "fadeIn 0.5s ease-in-out",
							slideUp: "slideUp 0.5s ease-in-out",
							slideDown: "slideDown 0.5s ease-in-out",
							slideLeft: "slideLeft 0.5s ease-in-out",
							slideRight: "slideRight 0.5s ease-in-out",
							shake: "shake 0.5s ease-in-out",
						},
						keyframes: {
							float: {
								"0%, 100%": { transform: "translateY(0)" },
								"50%": { transform: "translateY(-10px)" },
							},
							loader: {
								"0%": { transform: "rotate(0deg)" },
								"100%": { transform: "rotate(360deg)" },
							},
							"pulse-shadow": {
								"0%, 100%": { boxShadow: "0 0 0 0 rgba(14, 165, 233, 0.4)" },
								"50%": { boxShadow: "0 0 0 15px rgba(14, 165, 233, 0)" },
							},
							wiggle: {
								"0%, 100%": { transform: "rotate(-3deg)" },
								"50%": { transform: "rotate(3deg)" },
							},
							scale: {
								"0%": { transform: "scale(0.95)" },
								"100%": { transform: "scale(1)" },
							},
							fadeIn: {
								"0%": { opacity: "0" },
								"100%": { opacity: "1" },
							},
							slideUp: {
								"0%": { transform: "translateY(20px)", opacity: "0" },
								"100%": { transform: "translateY(0)", opacity: "1" },
							},
							slideDown: {
								"0%": { transform: "translateY(-20px)", opacity: "0" },
								"100%": { transform: "translateY(0)", opacity: "1" },
							},
							slideLeft: {
								"0%": { transform: "translateX(20px)", opacity: "0" },
								"100%": { transform: "translateX(0)", opacity: "1" },
							},
							slideRight: {
								"0%": { transform: "translateX(-20px)", opacity: "0" },
								"100%": { transform: "translateX(0)", opacity: "1" },
							},
							shake: {
								"0%, 100%": { transform: "translateX(0)" },
								"10%, 30%, 50%, 70%, 90%": { transform: "translateX(-5px)" },
								"20%, 40%, 60%, 80%": { transform: "translateX(5px)" },
							},
						},
						transitionProperty: {
							height: "height",
							spacing: "margin, padding",
							width: "width",
							transform: "transform",
						},
					},
				},
			};

				width: 8px;
				height: 8px;
			}

			::-webkit-scrollbar-track {
				background: #f1f1f1;
				border-radius: 4px;
			}

			.dark ::-webkit-scrollbar-track {
				background: #1e293b;
			}

			::-webkit-scrollbar-thumb {
				background: #cbd5e1;
				border-radius: 4px;
				transition: all 0.3s ease;
			}

			.dark ::-webkit-scrollbar-thumb {
				background: #475569;
			}

			::-webkit-scrollbar-thumb:hover {
				background: #94a3b8;
			}

			.dark ::-webkit-scrollbar-thumb:hover {
				background: #64748b;
			}

			html {
				scroll-behavior: smooth;
			}

			.glass {
				background: rgba(255, 255, 255, 0.8);
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				border: 1px solid rgba(255, 255, 255, 0.18);
				box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
			}

			.dark .glass {
				background: rgba(15, 23, 42, 0.8);
				border: 1px solid rgba(30, 41, 59, 0.18);
				box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
			}

			.card-3d {
				transition: transform 0.5s ease, box-shadow 0.5s ease;
				will-change: transform, box-shadow;
			}

			.card-3d:hover {
				transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
				box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.25);
			}

			.dark .card-3d:hover {
				box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
			}

			.parallax {
				transform-style: preserve-3d;
				perspective: 1000px;
			}

			.parallax-layer {
				transform: translateZ(0);
				transition: transform 0.35s ease;
			}

			.parallax:hover .parallax-layer-1 {
				transform: translateZ(30px);
			}

			.parallax:hover .parallax-layer-2 {
				transform: translateZ(60px);
			}

			.parallax:hover .parallax-layer-3 {
				transform: translateZ(90px);
			}

			.skeleton {
				animation: skeleton-loading 1.5s infinite;
			}

			@keyframes skeleton-loading {
				0%,
				100% {
					opacity: 0.5;
				}
				50% {
					opacity: 1;
				}
			}

			.mega-menu {
				visibility: hidden;
				opacity: 0;
				transform: translateY(10px);
				transition: visibility 0.2s, opacity 0.3s, transform 0.3s;
			}

			.mega-menu-trigger:hover .mega-menu {
				visibility: visible;
				opacity: 1;
				transform: translateY(0);
			}

			.voice-search-pulse {
				animation: pulse 1.5s infinite;
			}

			@keyframes pulse {
				0% {
					transform: scale(0.95);
					box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.7);
				}
				70% {
					transform: scale(1);
					box-shadow: 0 0 0 10px rgba(229, 62, 62, 0);
				}
				100% {
					transform: scale(0.95);
					box-shadow: 0 0 0 0 rgba(229, 62, 62, 0);
				}
			}

			.cart-bounce {
				animation: cart-bounce 0.5s ease;
			}

			@keyframes cart-bounce {
				0%,
				100% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.2);
				}
			}

			.preloader {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-color: white;
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 9999;
				transition: opacity 0.5s ease, visibility 0.5s ease;
			}

			.dark .preloader {
				background-color: #0f172a;
			}

			.preloader.hidden {
				opacity: 0;
				visibility: hidden;
			}

			.loader {
				width: 48px;
				height: 48px;
				border: 5px solid #e2e8f0;
				border-bottom-color: #0ea5e9;
				border-radius: 50%;
				animation: loader 1s linear infinite;
			}

			.dark .loader {
				border-color: #334155;
				border-bottom-color: #0ea5e9;
			}

			.product-card {
				transition: all 0.3s ease;
			}

			.product-card:hover {
				transform: translateY(-10px);
				box-shadow: 0 22px 45px -10px rgba(0, 0, 0, 0.15);
			}

			.dark .product-card:hover {
				box-shadow: 0 22px 45px -10px rgba(0, 0, 0, 0.5);
			}

			.product-card .product-image {
				transition: transform 0.5s ease;
			}

			.product-card:hover .product-image {
				transform: scale(1.08);
			}

			.product-card .product-actions {
				transition: all 0.3s ease;
			}

			.category-card {
				position: relative;
				overflow: hidden;
				transition: all 0.4s ease;
			}

			.category-card:hover {
				transform: translateY(-5px);
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
			}

			.dark .category-card:hover {
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
			}

			.category-card::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: linear-gradient(
					to bottom,
					rgba(0, 0, 0, 0) 0%,
					rgba(0, 0, 0, 0.6) 100%
				);
				opacity: 0.7;
				transition: opacity 0.3s ease;
			}

			.category-card:hover::before {
				opacity: 0.9;
			}

			.category-card img {
				transition: transform 0.6s ease;
			}

			.category-card:hover img {
				transform: scale(1.1);
			}

			.category-card .category-content {
				position: absolute;
				bottom: 0;
				left: 0;
				width: 100%;
				padding: 20px;
				color: white;
				transform: translateY(0);
				transition: transform 0.3s ease;
			}

			.category-card:hover .category-content {
				transform: translateY(-10px);
			}

			.btn-hover-expand {
				position: relative;
				overflow: hidden;
				transition: all 0.3s ease;
				z-index: 1;
			}

			.btn-hover-expand::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(255, 255, 255, 0.1);
				transform: translateX(-100%);
				transition: transform 0.3s ease;
				z-index: -1;
			}

			.btn-hover-expand:hover::before {
				transform: translateX(0);
			}

			.btn-hover-glow:hover {
				box-shadow: 0 0 15px rgba(14, 165, 233, 0.6);
				transform: translateY(-3px);
			}

			.image-gallery {
				position: relative;
			}

			.gallery-main-image {
				transition: all 0.3s ease;
			}

			.gallery-thumbnail {
				opacity: 0.7;
				cursor: pointer;
				transition: all 0.3s ease;
			}

			.gallery-thumbnail:hover,
			.gallery-thumbnail.active {
				opacity: 1;
				transform: scale(1.05);
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			}

			.pill-tag {
				transition: all 0.3s ease;
			}

			.pill-tag:hover {
				transform: translateY(-3px);
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
			}

			.swiper-slide {
				transition: transform 0.3s ease, opacity 0.3s ease;
			}

			.swiper-slide:not(.swiper-slide-active) {
				opacity: 0.7;
				transform: scale(0.9);
			}

			.compare-item {
				transition: all 0.3s ease;
			}

			.compare-item:hover {
				transform: translateY(-5px);
			}

			.compare-placeholder {
				border: 2px dashed #e5e7eb;
				border-radius: 8px;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.3s ease;
			}

			.compare-placeholder:hover {
				border-color: #0ea5e9;
				background-color: rgba(14, 165, 233, 0.05);
			}

			.mobile-menu {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: 50;
				transform: translateX(-100%);
				transition: transform 0.3s ease;
			}

			.mobile-menu.active {
				transform: translateX(0);
			}

			.filter-option {
				transition: all 0.2s ease;
			}

			.filter-option:hover {
				background-color: rgba(14, 165, 233, 0.1);
			}

			.countdown-item {
				position: relative;
				overflow: hidden;
			}

			.countdown-item::after {
				content: "";
				position: absolute;
				bottom: 0;
				left: 0;
				width: 100%;
				height: 2px;
				background: linear-gradient(to right, #0ea5e9, #a855f7);
			}

			.categories-menu {
				overflow: visible;
			}

			.categories-menu ul {
				display: flex;
				flex-wrap: wrap;
				gap: 0.25rem;
				overflow: visible;
			}

			.categories-menu ul li {
				white-space: normal;
			}

			@media (max-width: 768px) {
				.categories-menu ul {
					display: grid;
					grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
					gap: 0.5rem;
				}
			}
		</style>
	</head>

				const toggleDarkMode = () => {

				const addToRecentlyViewed = (product) => {
					if (!product) return;

					setRecentlyViewed((prev) => {
						const filtered = prev.filter((item) => item.id !== product.id);

						return [product, ...filtered].slice(0, 6);
					});
				};

				const addNotification = (message, type = "success") => {
					const id = Date.now();
					setNotifications((prev) => [...prev, { id, message, type }]);

					setTimeout(() => {
						setNotifications((prev) => prev.filter((item) => item.id !== id));
					}, 3000);
				};

				const addToCart = (product, quantity = 1, options = {}) => {
					if (!product) return;

					const { color, showNotification = true } = options;

					setCartItems((prevItems) => {
						const existingItem = prevItems.find(
							(item) => item.id === product.id
						);

						if (existingItem) {
							return prevItems.map((item) =>
								item.id === product.id
									? { ...item, quantity: item.quantity + quantity }
									: item
							);
						} else {
							return [
								...prevItems,
								{
									...product,
									quantity,
									selectedColor: color || product.colors[0],
								},
							];
						}
					});

					const cartIcon = document.getElementById("cart-icon");
					if (cartIcon) {
						cartIcon.classList.add("cart-bounce");
						setTimeout(() => {
							cartIcon.classList.remove("cart-bounce");
						}, 500);
					}

					if (showNotification) {
						addNotification(`${product.name} added to cart!`, "success");
					}

					setCartOpen(true);
					setTimeout(() => {
						setCartOpen(false);
					}, 3000);
				};

				const removeFromCart = (productId) => {
					setCartItems((prevItems) =>
						prevItems.filter((item) => item.id !== productId)
					);
				};

				const updateCartQuantity = (productId, quantity) => {
					if (quantity <= 0) {
						removeFromCart(productId);
						return;
					}

					setCartItems((prevItems) =>
						prevItems.map((item) =>
							item.id === productId ? { ...item, quantity } : item
						)
					);
				};

				const getCartTotal = () => {
					return cartItems.reduce(
						(total, item) => total + item.price * item.quantity,
						0
					);
				};

				const toggleWishlist = (product) => {
					if (!product) return;

					const isCurrentlyInWishlist = wishlistItems.some(
						(item) => item.id === product.id
					);

					setWishlistItems((prevItems) => {
						if (isCurrentlyInWishlist) {
							return prevItems.filter((item) => item.id !== product.id);
						} else {
							return [...prevItems, product];
						}
					});

					if (isCurrentlyInWishlist) {
						addNotification(`${product.name} removed from wishlist.`, "info");
					} else {
						addNotification(`${product.name} added to wishlist!`, "success");
					}
				};

				const isInWishlist = (productId) => {
					return wishlistItems.some((item) => item.id === productId);
				};

				const addToCompare = (product) => {
					if (compareItems.length >= 4) {
						addNotification(
							"You can compare up to 4 products at a time.",
							"warning"
						);
						return;
					}

					if (!compareItems.some((item) => item.id === product.id)) {
						setCompareItems((prev) => [...prev, product]);
						setShowCompareBar(true);
						addNotification(`${product.name} added to comparison.`, "success");
					} else {
						addNotification(
							`${product.name} is already in your comparison list.`,
							"info"
						);
					}
				};

				const removeFromCompare = (productId) => {
					setCompareItems((prev) =>
						prev.filter((item) => item.id !== productId)
					);
					if (compareItems.length <= 1) {
						setShowCompareBar(false);
					}
				};

				const clearCompareItems = () => {
					setCompareItems([]);
					setShowCompareBar(false);
					setShowCompareModal(false);
				};

				const filteredProducts = React.useMemo(() => {
					return products

						.filter((product) => {
							if (!searchQuery) return true;
							return (
								product.name
									.toLowerCase()
									.includes(searchQuery.toLowerCase()) ||
								product.description
									.toLowerCase()
									.includes(searchQuery.toLowerCase()) ||
								product.category
									.toLowerCase()
									.includes(searchQuery.toLowerCase()) ||
								product.tags.some((tag) =>
									tag.toLowerCase().includes(searchQuery.toLowerCase())
								)
							);
						})

						.filter((product) => {
							if (filters.category.length === 0) return true;
							return filters.category.includes(product.category.toLowerCase());
						})

						.filter((product) => {
							return (
								product.price >= filters.priceRange[0] &&
								product.price <= filters.priceRange[1]
							);
						})

						.filter((product) => {
							if (filters.rating === 0) return true;
							return product.rating >= filters.rating;
						})

						.filter((product) => {
							if (!filters.onSale) return true;
							return product.onSale;
						});
				}, [products, searchQuery, filters]);

				const sortedProducts = React.useMemo(() => {
					return [...filteredProducts].sort((a, b) => {
						switch (sortOption) {
							case "featured":
								return (b.featured ? 1 : 0) - (a.featured ? 1 : 0);
							case "best-selling":
								return (b.bestSeller ? 1 : 0) - (a.bestSeller ? 1 : 0);
							case "newest":
								return (b.new ? 1 : 0) - (a.new ? 1 : 0);
							case "price-low-high":
								return a.price - b.price;
							case "price-high-low":
								return b.price - a.price;
							case "rating":
								return b.rating - a.rating;
							case "discount":
								return b.discount - a.discount;
							default:
								return 0;
						}
					});
				}, [filteredProducts, sortOption]);

				const indexOfLastProduct = currentPage * itemsPerPage;
				const indexOfFirstProduct = indexOfLastProduct - itemsPerPage;
				const currentProducts = sortedProducts.slice(
					indexOfFirstProduct,
					indexOfLastProduct
				);
				const totalPages = Math.ceil(sortedProducts.length / itemsPerPage);

				const paginate = (pageNumber) => {
					setCurrentPage(pageNumber);
					window.scrollTo({ top: 0, behavior: "smooth" });
				};

				const resetFilters = () => {
					setFilters({
						category: [],
						priceRange: [0, 2000],
						rating: 0,
						onSale: false,

					setSearchQuery("");
					setSortOption("featured");
					setCurrentPage(1);
					addNotification("Filters have been reset.", "info");
				};

				const startVoiceSearch = () => {
					if (!("webkitSpeechRecognition" in window)) {
						addNotification(
							"Voice recognition is not supported in your browser.",
							"error"
						);
						return;
					}

					const recognition = new webkitSpeechRecognition();
					recognition.continuous = false;
					recognition.lang = "en-US";

					recognition.onstart = () => {
						setIsListening(true);
						addNotification("Listening... Speak now.", "info");
					};

					recognition.onresult = (event) => {
						const transcript = event.results[0][0].transcript;
						setSearchQuery(transcript);
						addNotification(`Searching for "${transcript}"`, "success");
					};

					recognition.onerror = (event) => {
						console.error("Speech recognition error", event.error);
						setIsListening(false);
						addNotification(
							"Speech recognition error. Please try again.",
							"error"
						);
					};

					recognition.onend = () => {
						setIsListening(false);
					};

					recognition.start();
				};

					cartItems,
					wishlistItems,

					viewType,

					paginate,

					setQuickViewProduct,
					startVoiceSearch,
					setShowCompareBar,
					setShowCompareModal,
					setActiveCategoryTab,
					setMobileMenuOpen,
					setMobileFiltersOpen,
					setCartOpen,
					addToRecentlyViewed,
					addNotification,
					setActiveTab,
				};

					<ShopContext.Provider value={contextValue}>
						{children}

						{}

								<div
									key={notification.id}
									className={`px-4 py-3 rounded-lg shadow-lg flex items-center justify-between
                  animate-slideUp
                  ${
										notification.type === "success"
											? "bg-green-500 text-white"
											: notification.type === "error"
											? "bg-red-500 text-white"
											: notification.type === "warning"
											? "bg-yellow-500 text-white"
											: "bg-blue-500 text-white"
									}`}
								>
									<div className="flex items-center">
										<span className="mr-2">
											{notification.type === "success" ? (

							<div className="flex flex-col md:flex-row justify-between items-center">

			const RecentlyViewed = () => {

				if (recentlyViewed.length === 0) return null;

				return (
					<div className="py-12 bg-gray-50 dark:bg-slate-900/50">

											<div className="flex justify-between items-center mt-1">
												<span className="text-sm font-semibold text-primary-600 dark:text-primary-400">
													${product.price.toFixed(2)}
												</span>
												<div className="flex space-x-1">
													<button
														onClick={() => setQuickViewProduct(product)}
														className="text-gray-400 hover:text-primary-500 transition-colors"
														aria-label="Quick view"
													>
														<i className="fas fa-eye text-xs"></i>
													</button>
													<button
														onClick={() => addToCart(product)}
														className="text-gray-400 hover:text-primary-500 transition-colors"
														aria-label="Add to cart"
													>
														<i className="fas fa-shopping-cart text-xs"></i>

											</div>

			};

			const App = () => {
				React.useEffect(() => {
					const preloader = document.getElementById("preloader");
					const preloaderText = document.getElementById("preloader-text");

					if (preloader && preloaderText) {
						setTimeout(() => {
							preloaderText.classList.remove("opacity-0");
						}, 300);

						const timeout = setTimeout(() => {
							preloader.classList.add("hidden");
						}, 2000);

						return () => clearTimeout(timeout);
					}
				}, []);

				return (
					<ShopProvider>
						<Navbar />

						<main>
							<Hero />
							<FeaturedCategories />
							<FeaturedProducts />
							<SpecialDealsBanner />
							<ProductCatalog />
							<ShoppingCart />
							<RecentlyViewed />
							<Testimonials />
							<Newsletter />
						</main>

						<Footer />
						<QuickViewModal />
						<CompareBar />
						<CompareModal />
					</ShopProvider>
				);
			};

			ReactDOM.createRoot(document.getElementById("root")).render(<App />);
		</script>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				setTimeout(() => {
					const notificationBell = document.querySelector(
						"button i.far.fa-bell"
					);

					if (notificationBell) {
						const bellButton = notificationBell.closest("button");

						const notificationDropdown = document.createElement("div");
						notificationDropdown.className =
							"notification-dropdown absolute right-0 mt-2 w-80 bg-white dark:bg-slate-800 rounded-lg shadow-xl py-2 z-50 hidden transform origin-top-right transition-all duration-200 opacity-0 translate-y-2";
						notificationDropdown.innerHTML = `
          <div class="px-4 py-2 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <h3 class="font-medium">Notifications</h3>
            <span class="bg-primary-500 text-white text-xs font-bold px-2 py-1 rounded-full">4 New</span>
          </div>
          
          <div class="max-h-72 overflow-y-auto">
            <!-- Success notification -->
            <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-slate-700 flex items-start transition-colors border-l-4 border-green-500">
              <span class="flex-shrink-0 bg-green-100 dark:bg-green-900/30 text-green-500 rounded-full p-2 mr-3">
                <i class="fas fa-check-circle"></i>
              </span>
              <div>
                <p class="font-medium text-sm">Order #3254 completed</p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Your order has been shipped and will arrive soon.</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">2 minutes ago</p>
              </div>
            </div>
            
            <!-- Info notification -->
            <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-slate-700 flex items-start transition-colors border-l-4 border-blue-500">
              <span class="flex-shrink-0 bg-blue-100 dark:bg-blue-900/30 text-blue-500 rounded-full p-2 mr-3">
                <i class="fas fa-info-circle"></i>
              </span>
              <div>
                <p class="font-medium text-sm">Free shipping promotion</p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Free shipping on all orders over $50!</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">1 hour ago</p>
              </div>
            </div>
            
            <!-- Warning notification -->
            <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-slate-700 flex items-start transition-colors border-l-4 border-yellow-500">
              <span class="flex-shrink-0 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-500 rounded-full p-2 mr-3">
                <i class="fas fa-exclamation-triangle"></i>
              </span>
              <div>
                <p class="font-medium text-sm">Item running low</p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">The smart watch you saved is running low on stock.</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">3 hours ago</p>
              </div>
            </div>
            
            <!-- Error notification -->
            <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-slate-700 flex items-start transition-colors border-l-4 border-red-500">
              <span class="flex-shrink-0 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full p-2 mr-3">
                <i class="fas fa-exclamation-circle"></i>
              </span>
              <div>
                <p class="font-medium text-sm">Payment method expired</p>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Please update your payment method for future orders.</p>
                <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">1 day ago</p>
              </div>
            </div>
          </div>
          
          <div class="border-t border-gray-200 dark:border-gray-700 px-4 py-2 text-center">
            <a href="#" class="text-xs text-primary-500 hover:text-primary-600 dark:hover:text-primary-400 font-medium">View all notifications</a>
          </div>
        `;

						document.body.appendChild(notificationDropdown);

						function positionDropdown() {
							const buttonRect = bellButton.getBoundingClientRect();
							notificationDropdown.style.position = "fixed";
							notificationDropdown.style.top = `${
								buttonRect.bottom + window.scrollY
							}px`;
							notificationDropdown.style.right = `${
								window.innerWidth - buttonRect.right
							}px`;
							notificationDropdown.style.zIndex = "9999";
						}

						let isOpen = false;
						bellButton.addEventListener("click", function (e) {
							e.preventDefault();
							e.stopPropagation();

							positionDropdown();

							if (isOpen) {
								notificationDropdown.classList.add(
									"opacity-0",
									"translate-y-2"
								);
								setTimeout(() => {
									notificationDropdown.classList.add("hidden");
								}, 200);
							} else {
								notificationDropdown.classList.remove("hidden");
								setTimeout(() => {
									notificationDropdown.classList.remove(
										"opacity-0",
										"translate-y-2"
									);
								}, 10);
							}

							isOpen = !isOpen;
						});

						document.addEventListener("click", function (e) {
							if (
								isOpen &&
								!notificationDropdown.contains(e.target) &&
								e.target !== bellButton &&
								!bellButton.contains(e.target)
							) {
								notificationDropdown.classList.add(
									"opacity-0",
									"translate-y-2"
								);
								setTimeout(() => {
									notificationDropdown.classList.add("hidden");
								}, 200);
								isOpen = false;
							}
						});

						window.addEventListener("scroll", function () {
							if (isOpen) {
								positionDropdown();
							}
						});

						window.addEventListener("resize", function () {
							if (isOpen) {
								positionDropdown();
							}
						});

						console.log("Notification dropdown initialized successfully");
					} else {
						console.log("Notification bell not found, retrying...");

						setTimeout(() => {
							const retryBell =
								document.querySelector("button:has(i.far.fa-bell)") ||
								document.querySelector("button:has(.fa-bell)") ||
								document.querySelector("button.relative");

							if (retryBell) {
								console.log("Found notification bell on retry");

								retryBell.setAttribute("data-notification-initialized", "true");
							}
						}, 1000);
					}
				}, 500);
			});
		</script>
	</body>
</html>
