				{
					id: 8,
					title: "Time & Dates",
					content:
						"Learn to tell time and discuss dates in different languages.",
					icon: "⏰",
					language: "Korean",
					difficulty: "Intermediate",
					estimatedTime: "20 min",
					quiz: [
						{
							question: "How do you say 'What time is it?' in German?",
							options: [
								"Wie spät ist es?",
								"Welcher Tag ist heute?",
								"Wann gehen wir?",
								"Wie viel Uhr?",
							],
							correct: "Wie spät ist es?",
						},
						{
							question: "What is 'Tomorrow' in Spanish?",
							options: ["Mañana", "Ayer", "Hoy", "Pasado mañana"],
							correct: "Mañana",
						},
						{
							question: "How do you say 'Monday' in French?",
							options: ["Lundi", "Mardi", "Mercredi", "Jeudi"],
							correct: "Lundi",

					],
					words: {
						Today: "Hoy",
						Tomorrow: "Mañana",
						Week: "Semana",

			// Function to shuffle arrays (for quiz options)
			function shuffleArray(array) {
				return [...array].sort(() => Math.random() - 0.5);
			}

			// Animation timing utility
			const getAnimationStyle = (index, delay = 0.05) => ({
				animationDelay: `${index * delay}s`,
			});

			// Main App Component
			function App() {
				// Core state variables
				const [view, setView] = useState("profile");
				const [userName, setUserName] = useState(
					localStorage.getItem("userName") || ""
				);
				const [selectedLesson, setSelectedLesson] = useState(null);
				const [quizAnswers, setQuizAnswers] = useState({});
				const [quizFeedback, setQuizFeedback] = useState({});
				const [progress, setProgress] = useState(
					() => JSON.parse(localStorage.getItem("progress")) || {}
				);
				const [bookmarks, setBookmarks] = useState(
					() => JSON.parse(localStorage.getItem("bookmarks")) || []
				);
				const [answerHistory, setAnswerHistory] = useState([]);
				const [streak, setStreak] = useState(
					() =>
						JSON.parse(localStorage.getItem("streak")) || {
							count: 0,
							lastDate: null,
						}
				);
				const [badges, setBadges] = useState(
					() => JSON.parse(localStorage.getItem("badges")) || []
				);
				const [leaderboard, setLeaderboard] = useState(
					() => JSON.parse(localStorage.getItem("leaderboard")) || []
				);
				const [dragMatches, setDragMatches] = useState({});
				const [flashcardIndex, setFlashcardIndex] = useState(0);
				const [flashcardSide, setFlashcardSide] = useState("front");
				const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
				const [activeTab, setActiveTab] = useState("all");
				const [searchTerm, setSearchTerm] = useState("");
				const [nightMode, setNightMode] = useState(
					() => JSON.parse(localStorage.getItem("nightMode")) || false
				);
				const [preferredLanguage, setPreferredLanguage] = useState(
					() => localStorage.getItem("preferredLanguage") || "all"
				);
				const [reminderTime, setReminderTime] = useState(
					() => localStorage.getItem("reminderTime") || ""
				);

				const topNavRef = useRef(null);
				const mainContentRef = useRef(null);

				// Effect to handle localStorage persistence
				useEffect(() => {
					const today = new Date().toDateString();
					if (streak.lastDate !== today) {
						const yesterday = new Date();
						yesterday.setDate(yesterday.getDate() - 1);
						if (streak.lastDate === yesterday.toDateString()) {
							setStreak({ count: streak.count + 1, lastDate: today });
						} else if (
							!streak.lastDate ||
							new Date(streak.lastDate) < yesterday
						) {
							setStreak({ count: 1, lastDate: today });
						}
					}
					localStorage.setItem("streak", JSON.stringify(streak));
					localStorage.setItem("progress", JSON.stringify(progress));
					localStorage.setItem("bookmarks", JSON.stringify(bookmarks));
					localStorage.setItem("userName", userName);
					localStorage.setItem("badges", JSON.stringify(badges));
					localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
					localStorage.setItem("nightMode", JSON.stringify(nightMode));
					localStorage.setItem("preferredLanguage", preferredLanguage);
					localStorage.setItem("reminderTime", reminderTime);
				}, [
					streak,
					progress,
					bookmarks,
					userName,
					badges,
					leaderboard,
					nightMode,
					preferredLanguage,
					reminderTime,
				]);

				// Effect to scroll to top when view changes
				useEffect(() => {
					if (mainContentRef.current) {
						mainContentRef.current.scrollTop = 0;
					}
					window.scrollTo(0, 0);
				}, [view]);

				// Profile submission handler
				const handleProfileSubmit = (e) => {
					e.preventDefault();
					const name = e.target.elements.name.value.trim();
					if (name) {
						setUserName(name);
						setView("lessons");
					}
				};

				// Bookmark toggle
				const toggleBookmark = (lessonId) => {
					setBookmarks((prev) =>
						prev.includes(lessonId)
							? prev.filter((id) => id !== lessonId)
							: [...prev, lessonId]
					);
				};

				// Quiz answer handler
				const handleAnswer = (lessonId, questionIdx, answer) => {
					const key = `${lessonId}-${questionIdx}`;
					const question = selectedLesson.quiz[questionIdx];
					const isCorrect = answer === question.correct;

					setQuizAnswers((prev) => ({ ...prev, [key]: answer }));
					setQuizFeedback((prev) => ({ ...prev, [key]: isCorrect }));
					setAnswerHistory((prev) => [
						...prev,
						{ lessonId, questionIdx, answer, isCorrect, timestamp: new Date() },
					]);
				};

				// Progress and badges updater
				const updateProgressAndBadges = (lessonId, score) => {
					setProgress((prev) => ({ ...prev, [lessonId]: score }));
					setLeaderboard((prev) => {
						const newEntry = {
							name: userName,
							score: Object.values({ ...progress, [lessonId]: score }).reduce(
								(a, b) => a + b,
								0
							),
						};
						const updated = [
							...prev.filter((e) => e.name !== userName),
							newEntry,
						]
							.sort((a, b) => b.score - a.score)
							.slice(0, 5);
						return updated;
					});
					if (score === 100 && !badges.includes(lessonId)) {
						setBadges((prev) => [...prev, lessonId]);
					}
				};

				// Progress color utility
				const getProgressColor = (percent) => {
					if (percent >= 75) return nightMode ? "bg-green-600" : "bg-green-500";
					if (percent >= 50)
						return nightMode ? "bg-yellow-600" : "bg-yellow-500";
					return nightMode ? "bg-red-600" : "bg-red-500";
				};

				// Filter lessons based on search and tab
				const filteredLessons = sampleLessons.filter((lesson) => {
					// Text search
					const matchesSearch =
						searchTerm === "" ||
						lesson.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
						lesson.content.toLowerCase().includes(searchTerm.toLowerCase()) ||
						lesson.language.toLowerCase().includes(searchTerm.toLowerCase());

					// Tab filter
					if (activeTab === "all") return matchesSearch;
					if (activeTab === "bookmarked")
						return bookmarks.includes(lesson.id) && matchesSearch;
					if (activeTab === "inProgress")
						return (
							progress[lesson.id] && progress[lesson.id] < 100 && matchesSearch
						);
					if (activeTab === "completed")
						return progress[lesson.id] === 100 && matchesSearch;

					// Language filter
					if (preferredLanguage !== "all") {
						return (
							lesson.language.toLowerCase() ===
								preferredLanguage.toLowerCase() && matchesSearch
						);
					}

					return matchesSearch;
				});

				// Navbar Component
				const Navbar = () => (
					<nav
						ref={topNavRef}
						className={`${
							nightMode
								? "bg-gray-900 text-gray-200"
								: "bg-indigo-700 text-white"
						} px-3 py-3 shadow-lg fixed top-0 left-0 right-0 z-20 transition-colors duration-300`}
					>
						<div className="max-w-7xl mx-auto flex justify-between items-center">
							<h1 className="text-xl font-bold flex items-center">
								<i className="fas fa-globe mr-2"></i> Language Master
							</h1>

							{/* Mobile menu button */}
							<div className="flex items-center">
								<button
									onClick={() => setNightMode(!nightMode)}
									className="mr-3 p-1 rounded-full hover:bg-opacity-20 hover:bg-white transition"
								>
									<i
										className={`fas ${
											nightMode ? "fa-sun" : "fa-moon"
										} text-sm`}
									></i>
								</button>

								<button
									className="md:hidden p-1 rounded focus:outline-none"
									onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
								>
									<i
										className={`fas ${
											mobileMenuOpen ? "fa-times" : "fa-bars"
										} text-lg`}
									></i>
								</button>
							</div>

							{/* Desktop menu */}
							<div className="hidden md:flex gap-4">
								{userName && (
									<>
										<button
											onClick={() => {
												setView("lessons");
												setMobileMenuOpen(false);
											}}
											className="hover:text-indigo-200 transition text-sm px-2 py-1"
										>
											Lessons
										</button>
										<button
											onClick={() => {
												setView("progress");
												setMobileMenuOpen(false);
											}}
											className="hover:text-indigo-200 transition text-sm px-2 py-1"
										>
											Progress
										</button>
										<button
											onClick={() => {
												setView("settings");
												setMobileMenuOpen(false);
											}}
											className="hover:text-indigo-200 transition text-sm px-2 py-1"
										>
											Settings
										</button>
										<button
											onClick={() => {
												setSelectedLesson(sampleLessons[0]);
												setView("wordmatch");
												setMobileMenuOpen(false);
											}}
											className="hover:text-indigo-200 transition text-sm px-2 py-1"
										>
											Practice
										</button>
										<button
											onClick={() => {
												setView("about");
												setMobileMenuOpen(false);
											}}
											className="hover:text-indigo-200 transition text-sm px-2 py-1"
										>
											About
										</button>
									</>
								)}
							</div>
						</div>

						{/* Mobile menu dropdown */}
						{mobileMenuOpen && userName && (
							<div
								className={`md:hidden mt-2 rounded-lg overflow-hidden shadow-lg ${
									nightMode ? "bg-gray-800" : "bg-indigo-600"
								} animate-slide-down`}
							>
								<button
									onClick={() => {
										setView("lessons");
										setMobileMenuOpen(false);
									}}
									className="block w-full text-left px-4 py-3 text-sm hover:bg-opacity-20 hover:bg-white transition border-b border-opacity-10 border-white"
								>
									Lessons
								</button>
								<button
									onClick={() => {
										setView("progress");
										setMobileMenuOpen(false);
									}}
									className="block w-full text-left px-4 py-3 text-sm hover:bg-opacity-20 hover:bg-white transition border-b border-opacity-10 border-white"
								>
									Progress
								</button>
								<button
									onClick={() => {
										setView("settings");
										setMobileMenuOpen(false);
									}}
									className="block w-full text-left px-4 py-3 text-sm hover:bg-opacity-20 hover:bg-white transition border-b border-opacity-10 border-white"
								>
									Settings
								</button>
								<button
									onClick={() => {
										setSelectedLesson(sampleLessons[0]);
										setView("wordmatch");
										setMobileMenuOpen(false);
									}}
									className="block w-full text-left px-4 py-3 text-sm hover:bg-opacity-20 hover:bg-white transition border-b border-opacity-10 border-white"
								>
									Word Match
								</button>
								<button
									onClick={() => {
										setSelectedLesson(sampleLessons[0]);
										setView("flashcards");
										setMobileMenuOpen(false);
									}}
									className="block w-full text-left px-4 py-3 text-sm hover:bg-opacity-20 hover:bg-white transition border-b border-opacity-10 border-white"
								>
									Flashcards
								</button>
								<button
									onClick={() => {
										setView("about");
										setMobileMenuOpen(false);
									}}
									className="block w-full text-left px-4 py-3 text-sm hover:bg-opacity-20 hover:bg-white transition"
								>
									About
								</button>
							</div>
						)}
					</nav>
				);

				// Bottom Navigation for Mobile
				const BottomNav = () =>
					userName ? (
						<div
							className={`md:hidden fixed bottom-0 left-0 right-0 ${
								nightMode
									? "bg-gray-900 text-gray-200"
									: "bg-white text-gray-700"
							} shadow-lg-up flex justify-around items-center z-20 border-t ${
								nightMode ? "border-gray-800" : "border-gray-200"
							}`}
						>
							<button
								onClick={() => setView("lessons")}
								className={`flex flex-col items-center pt-2 pb-1 flex-1 ${
									view === "lessons"
										? nightMode
											? "text-indigo-400"
											: "text-indigo-600"
										: ""
								}`}
							>
								<i className="fas fa-book-open text-sm"></i>
								<span className="text-xs mt-1">Lessons</span>
							</button>
							<button
								onClick={() => setView("progress")}
								className={`flex flex-col items-center pt-2 pb-1 flex-1 ${
									view === "progress"

			// Custom hook for screen size, will help with responsive design
			function useWindowSize() {
				const [windowSize, setWindowSize] = useState({
					width: window.innerWidth,
					height: window.innerHeight,
				});

				useEffect(() => {
					function handleResize() {
						setWindowSize({
							width: window.innerWidth,
							height: window.innerHeight,
						});
					}

					window.addEventListener("resize", handleResize);
					return () => window.removeEventListener("resize", handleResize);
				}, []);
