<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Virtual Concert Experience</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
			rel="stylesheet"
		/>
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							concert: {
								dark: "#1a1a2e",
								darker: "#16213e",
								light: "#ffffff",
							},
						},
						animation: {
							float: "float 3s ease-out forwards",
							glow: "glow 1.5s infinite alternate",
						},
						keyframes: {
							float: {
								"0%": { transform: "translateY(0) scale(1)" },
								"20%": { transform: "translateY(-20px) scale(1.2)" },
								"100%": {
									transform: "translateY(-150vh) scale(1)",
									opacity: 0,
								},
							},
							glow: {
								from: { textShadow: "0 0 5px #fff" },
								to: { textShadow: "0 0 20px #fff" },
							},
							fadeIn: {
								from: { opacity: 0, transform: "translateY(10px)" },
								to: { opacity: 1, transform: "translateY(0)" },
							},
						},
					},
				},
			};
		</script>
		<style>
			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(10px);
				}

				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes float {
				0% {
					transform: translateY(0) scale(1);
				}

				20% {
					transform: translateY(-20px) scale(1.2);
				}

				100% {
					transform: translateY(-150vh) scale(1);
					opacity: 0;
				}
			}

			@keyframes glow {
				from {
					text-shadow: 0 0 5px #fff;
				}

				to {
					text-shadow: 0 0 20px #fff;
				}
			}

			canvas {
				filter: brightness(1.2) contrast(1.2);
			}

			#chat-messages::-webkit-scrollbar {
				width: 5px;
			}

			#chat-messages::-webkit-scrollbar-thumb {
				background: #888;
				border-radius: 5px;
			}

			.emoji-reaction {
				position: absolute;
				font-size: 28px;
				pointer-events: none;
				animation: float 3s ease-out forwards, glow 1.5s infinite alternate;
			}

			#chat li {
				animation: fadeIn 0.5s ease-out;
			}

			@keyframes pulse {
				0% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.05);
				}
				100% {
					transform: scale(1);
				}
			}

			.pulse {
				animation: pulse 2s infinite;
			}
		</style>
	</head>

	<body
		class="m-0 overflow-hidden font-['Poppins',sans-serif] bg-gradient-to-b from-concert-dark to-concert-darker"
	>
		<div
			id="top-bar"
			class="fixed top-0 left-0 w-full bg-black/70 text-white py-3 px-4 z-20 flex justify-between items-center"
		>
			<div id="header" class="text-lg font-semibold text-center flex-grow">
				<span class="text-shadow-sm">🎵</span> Virtual Concert Live
			</div>
			<div class="flex items-center gap-2">
				<button
					id="login-btn"
					class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm transition-colors"
				>
					Login
				</button>
				<button
					id="settings-btn"
					class="bg-gray-600 hover:bg-gray-700 text-white p-2 rounded-lg"
				>
					⚙️
				</button>
			</div>
		</div>

		<div
			id="controls-info"
			class="fixed top-14 left-2 text-white bg-black/60 p-2.5 rounded-lg text-sm shadow-md z-10 hidden md:block"
		>
			W: forward<br />S: back<br />A: left<br />D: right<br />R: reaction
		</div>

		<div
			id="volume-control"
			class="fixed top-14 right-2 p-2 bg-black/60 rounded-lg z-10 flex items-center"
		>
			<span class="text-white mr-2">🔊</span>
			<input
				type="range"
				id="volume-slider"
				min="0"
				max="100"
				value="100"

		<div

			class="fixed top-14 left-2 z-10 flex-col gap-1 hidden"

			<button

				class="text-xl py-2 px-3 bg-white/20 border-none text-white rounded-lg font-bold shadow-md cursor-pointer"

				⬆️
			</button>
			<div class="flex justify-center">
				<button
					data-dir="a"
					class="text-xl py-2 px-3 bg-white/20 border-none text-white rounded-lg font-bold shadow-md cursor-pointer mx-0.5"
				>
					⬅️
				</button>
				<button
					data-dir="s"
					class="text-xl py-2 px-3 bg-white/20 border-none text-white rounded-lg font-bold shadow-md cursor-pointer mx-0.5"

					⬇️
				</button>
				<button
					data-dir="d"
					class="text-xl py-2 px-3 bg-white/20 border-none text-white rounded-lg font-bold shadow-md cursor-pointer mx-0.5"

			<button
				data-dir="r"
				class="text-xl py-2 px-3 bg-white/20 border-none text-white rounded-lg font-bold shadow-md cursor-pointer"

				🎉

		<div
			id="settings-panel"
			class="fixed top-12 right-2 bg-black/90 text-white p-4 rounded-lg shadow-lg z-30 w-64 hidden"
		>
			<h3 class="text-lg font-semibold mb-3">Settings</h3>
			<div class="mb-3">
				<label class="block mb-1">Graphics Quality</label>
				<select
					id="graphics-quality"

					<option value="medium" selected>Medium</option>

			</div>
			<div class="mb-3">

					type="range"

					max="100"

			<div class="mb-3">
				<label class="block mb-1">Effects Volume</label>
				<input
					type="range"
					id="effects-volume"

					max="100"

			</div>
			<div class="flex justify-between">
				<button
					id="settings-close"
					class="bg-gray-600 hover:bg-gray-700 px-3 py-1.5 rounded"

					Close

				<button
					id="settings-save"
					class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded"
				>
					Save
				</button>
			</div>
		</div>

		<div
			id="login-modal"
			class="fixed inset-0 bg-black/80 flex items-center justify-center z-40 hidden"
		>
			<div class="bg-gray-800 text-white p-6 rounded-xl shadow-xl w-80">
				<h2 class="text-xl font-semibold mb-4">Login to Virtual Concert</h2>
				<div class="mb-4">
					<label class="block mb-1">Username</label>
					<input
						type="text"
						class="w-full bg-gray-700 text-white p-2 rounded"
						placeholder="Enter username"
					/>
				</div>
				<div class="mb-6">
					<label class="block mb-1">Password</label>
					<input
						type="password"
						class="w-full bg-gray-700 text-white p-2 rounded"
						placeholder="••••••••"
					/>
				</div>
				<div class="flex justify-between">
					<button
						id="login-close"
						class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded"
					>
						Cancel
					</button>
					<button class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">
						Login
					</button>
				</div>
				<div class="mt-4 text-center text-sm text-gray-400">
					<a href="#" class="hover:text-blue-400">Create account</a> |
					<a href="#" class="hover:text-blue-400">Forgot password?</a>
				</div>
			</div>
		</div>

		<div
			id="play-button-container"
			class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-gradient-to-b from-black/80 to-black/95"
		>
			<div class="relative">
				<div
					class="absolute inset-0 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full opacity-70 blur-md transform scale-110 animate-pulse"
				></div>

				<button
					id="play-button"
					class="relative bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 text-white w-36 h-36 rounded-full flex items-center justify-center shadow-[0_0_25px_rgba(59,130,246,0.5)] transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-400 focus:ring-opacity-50 pulse"
				>
					<span class="text-6xl filter drop-shadow-lg">▶️</span>
				</button>
			</div>

			<p
				class="mt-6 text-white text-xl font-semibold animate-pulse tracking-wider"
			>
				START EXPERIENCE
			</p>
		</div>

		<button
			id="floating-play-button"
			class="fixed bottom-4 left-4 bg-black/60 text-white p-3 rounded-full z-30 shadow-lg hidden"
		>
			<span id="play-icon">▶️</span>
			<span id="pause-icon" class="hidden">⏸️</span>
		</button>

		<video
			id="concert-video"
			src="https://media-hosting.imagekit.io/d3077eab6005469e/2022395-hd_1920_1080_30fps.mp4?Expires=1838650095&Key-Pair-Id=K2ZIVPTIP2VGHC&Signature=dXYPrpqpZv4NM~daYQbTLRy1nH7URueMtDguxyQmD6Kc3jjdzWe9vllHl7p-K93c6rkJ2BOMKXMpK-v7EO1-TmvCEGG3BWhAuqgTzCAmhUiR-bc2xby1yTUecakGoNtJ1cKm9qQ8RUfDrtgtbRuFV05aOW5jh5GNEhhz8xkkT4zVRqwUT5T51cusvE6oqjzb~9Lu8xFq4WLWmXdxRLCIVqSt1s01lXL2ReMsahDif-97tEfvSbP2t6y31wRv9LSD0forht4EfkJacwOyZT4Cs8pb94dDU0JKCm8icwAS3iAKJd7rNYJ4jFFTIBEc9NvRQCHjPPSE7wum9rOQWUqMLQ__"
			autoplay
			loop
			muted
			playsinline
			crossorigin="anonymous"
			class="hidden"
		></video>
		<audio
			id="ambient-sound"
			src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
			loop
		></audio>
		<audio
			id="cheer-sound"
			src="https://cdn.freesound.org/previews/425/425432_4929074-lq.mp3"
			preload="auto"
		></audio>

		<div
			id="chat"
			class="fixed bottom-2 right-2 w-80 bg-black/75 text-white rounded-2xl shadow-lg z-10 overflow-hidden transition-all duration-300"
		>
			<div
				id="chat-toggle"
				class="py-3 px-5 font-semibold cursor-pointer bg-white/10 rounded-t-2xl select-none"
			>
				💬 Chat
			</div>
			<div
				id="chat-body"
				class="h-64 p-5 flex flex-col transition-all duration-300"
			>
				<ul
					id="chat-messages"
					class="flex-1 overflow-y-auto list-none p-0 m-0 pr-2.5"
				></ul>
				<div id="chat-form" class="flex mt-4">
					<input
						id="chat-input"
						type="text"
						placeholder="Type a message..."
						class="flex-1 py-2 px-3 border-none rounded-lg mr-2.5 bg-white/90 text-gray-800"
					/>
					<button
						id="chat-send"
						class="py-2 px-4 border-none rounded-lg bg-blue-600 hover:bg-blue-700 text-white cursor-pointer transition-colors"
					>
						Send
					</button>
				</div>
			</div>
		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
		<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
		<script>
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(
				75,
				window.innerWidth / window.innerHeight,
				0.1,
				1000
			);
			const renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.shadowMap.enabled = true;
			document.body.appendChild(renderer.domElement);

			scene.fog = new THREE.Fog(0x0a0a1a, 10, 60);
			renderer.setClearColor(0x0a0a1a);

			const chatBox = document.getElementById("chat");
			const chatToggle = document.getElementById("chat-toggle");
			const chatBody = document.getElementById("chat-body");

			chatToggle.onclick = () => {
				chatBox.classList.toggle("h-auto");
				chatBody.classList.toggle("h-0");
				chatBody.classList.toggle("opacity-0");
				chatBody.classList.toggle("pointer-events-none");
				chatBody.classList.toggle("p-0");
			};

			const video = document.getElementById("concert-video");
			video.volume = 1;
			const texture = new THREE.VideoTexture(video);
			const screenGeometry = new THREE.PlaneGeometry(14, 8);
			const screenMaterial = new THREE.MeshBasicMaterial({
				map: texture,
				side: THREE.DoubleSide,
			});
			const screen = new THREE.Mesh(screenGeometry, screenMaterial);

			screen.position.set(0, 7, -12);
			scene.add(screen);

			screen.scale.set(1.1, 1.1, 1);

			const ambientSound = document.getElementById("ambient-sound");
			const cheerSound = document.getElementById("cheer-sound");
			ambientSound.volume = 0.2;
			cheerSound.volume = 0.4;

			const stage = new THREE.Mesh(
				new THREE.BoxGeometry(20, 2, 10),
				new THREE.MeshStandardMaterial({ color: 0x404040 })
			);
			stage.position.set(0, 1, -10);
			stage.castShadow = true;
			scene.add(stage);

			const floor = new THREE.Mesh(
				new THREE.PlaneGeometry(100, 100),
				new THREE.MeshStandardMaterial({ color: 0x222222 })
			);
			floor.rotation.x = -Math.PI / 2;
			floor.receiveShadow = true;
			scene.add(floor);

			const crowd = [];
			const bodyColors = [
				0xff9999, 0x99ff99, 0x9999ff, 0xffff99, 0xff99ff, 0x99ffff,
			];
			const headColors = [0xffffff, 0xffccff, 0xccffff, 0xffffcc, 0xffcccc];
			const heights = [0.9, 1.0, 1.1, 1.2];

			for (let i = 0; i < 80; i++) {
				const bodyColor =
					bodyColors[Math.floor(Math.random() * bodyColors.length)];
				const headColor =
					headColors[Math.floor(Math.random() * headColors.length)];
				const height = heights[Math.floor(Math.random() * heights.length)];

				const person = new THREE.Group();

				const body = new THREE.Mesh(
					new THREE.CylinderGeometry(0.3, 0.4, height, 8),
					new THREE.MeshStandardMaterial({ color: bodyColor })
				);

				const head = new THREE.Mesh(
					new THREE.SphereGeometry(0.25, 12, 12),
					new THREE.MeshStandardMaterial({ color: headColor })
				);
				head.position.y = height / 2 + 0.25;

				if (Math.random() > 0.3) {
					const leftArm = new THREE.Mesh(
						new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8),
						new THREE.MeshStandardMaterial({ color: bodyColor })
					);
					leftArm.position.set(-0.4, height / 4, 0);
					leftArm.rotation.z = -Math.PI / 4;

					const rightArm = new THREE.Mesh(
						new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8),
						new THREE.MeshStandardMaterial({ color: bodyColor })
					);
					rightArm.position.set(0.4, height / 4, 0);
					rightArm.rotation.z = Math.PI / 4;

					person.add(leftArm, rightArm);
				}

				person.add(body, head);

				const x = (Math.random() - 0.5) * 30;
				const z = Math.random() * 20 - 5;

				person.position.set(x, height / 2, z);

				person.userData.baseY = height / 2;
				person.userData.height = height;

				person.rotation.y =
					Math.random() > 0.7
						? Math.random() * Math.PI * 2
						: Math.atan2(-z, -x);

				scene.add(person);
				crowd.push(person);
			}

			const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
			scene.add(hemiLight);
			scene.add(new THREE.AmbientLight(0xffffff, 0.1));

			const spotlight = (
				color,
				x,
				y,
				z,
				targetX = 0,
				targetY = 0,
				targetZ = -10
			) => {
				const light = new THREE.SpotLight(color, 2, 50, Math.PI / 6, 0.5);
				light.position.set(x, y, z);
				light.target.position.set(targetX, targetY, targetZ);
				light.castShadow = true;
				scene.add(light, light.target);
				return light;
			};

			const createCeilingFixture = (x, y, z) => {
				const fixture = new THREE.Group();

				const base = new THREE.Mesh(
					new THREE.BoxGeometry(0.8, 0.3, 0.8),
					new THREE.MeshStandardMaterial({ color: 0x333333 })
				);

				const head = new THREE.Mesh(
					new THREE.CylinderGeometry(0.3, 0.2, 0.5, 8),
					new THREE.MeshStandardMaterial({ color: 0x666666 })
				);
				head.rotation.x = Math.PI / 2;
				head.position.y = -0.3;

				fixture.add(base, head);
				fixture.position.set(x, y, z);
				scene.add(fixture);

				return fixture;
			};

			const spotLight1 = spotlight(0xff0000, -10, 15, 5);
			const spotLight2 = spotlight(0x00ff00, 10, 15, 5);
			const spotLight3 = spotlight(0x0000ff, 0, 15, 10);

			const createLaser = (color, fixture) => {
				const laserMaterial = new THREE.LineBasicMaterial({ color: color });
				const laserGeometry = new THREE.BufferGeometry();

				const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 0)];

				laserGeometry.setFromPoints(points);
				const laser = new THREE.Line(laserGeometry, laserMaterial);
				laser.frustumCulled = false;

				laser.userData.points = points;
				laser.userData.fixture = fixture;

				scene.add(laser);
				return laser;
			};

			const fixture1 = createCeilingFixture(-8, 12, 0);
			const fixture2 = createCeilingFixture(0, 12, 0);
			const fixture3 = createCeilingFixture(8, 12, 0);
			const fixture4 = createCeilingFixture(-4, 12, 5);
			const fixture5 = createCeilingFixture(4, 12, 5);

			const lasers = [
				createLaser(0x00ffff, fixture1),
				createLaser(0xff00ff, fixture2),
				createLaser(0xffff00, fixture3),
				createLaser(0xff8800, fixture4),
				createLaser(0x00ff88, fixture5),
			];

			function updateLasers() {
				lasers.forEach((laser, i) => {
					const time = Date.now() * 0.001;
					const fixture = laser.userData.fixture;

					fixture.rotation.y = time * (0.2 + i * 0.05);

					const radius = 10 + Math.sin(time * 0.5) * 5;
					const targetX = Math.sin(time * (0.5 + i * 0.1)) * radius;
					const targetZ = Math.cos(time * (0.7 + i * 0.1)) * radius - 5;
					const targetY = Math.max(0, Math.sin(time * 0.3) * 3);

					const fixturePos = new THREE.Vector3();
					fixture.children[1].getWorldPosition(fixturePos);

					laser.userData.points[0].copy(fixturePos);
					laser.userData.points[1].set(targetX, targetY, targetZ);

					laser.geometry.setFromPoints(laser.userData.points);
					laser.geometry.attributes.position.needsUpdate = true;
				});
			}

			const particleGeometry = new THREE.BufferGeometry();
			const particleCount = 1500;
			const positions = new Float32Array(particleCount * 3);
			const velocities = new Float32Array(particleCount * 3);
			for (let i = 0; i < particleCount * 3; i++) {
				positions[i] = (Math.random() - 0.5) * 100;
				velocities[i] = (Math.random() - 0.5) * 0.01;
			}
			particleGeometry.setAttribute(
				"position",
				new THREE.BufferAttribute(positions, 3)
			);
			const particleMaterial = new THREE.PointsMaterial({
				color: 0xffffff,
				size: 0.05,
				transparent: true,
				opacity: 0.7,
			});
			const particles = new THREE.Points(particleGeometry, particleMaterial);
			scene.add(particles);

			const performerGroup = new THREE.Group();

			const legs = new THREE.Mesh(
				new THREE.CylinderGeometry(0.3, 0.3, 1.5, 12),
				new THREE.MeshStandardMaterial({ color: 0x5522aa })
			);
			legs.position.y = 0.75;
			performerGroup.add(legs);

			const torso = new THREE.Mesh(
				new THREE.CylinderGeometry(0.5, 0.4, 1.5, 12),
				new THREE.MeshStandardMaterial({ color: 0xff00ff })
			);
			torso.position.y = 2.2;
			performerGroup.add(torso);

			const head = new THREE.Mesh(
				new THREE.SphereGeometry(0.4, 16, 16),
				new THREE.MeshStandardMaterial({ color: 0xffccaa })
			);
			head.position.y = 3.2;
			performerGroup.add(head);

			const leftArm = new THREE.Mesh(
				new THREE.CylinderGeometry(0.15, 0.12, 1.0, 12),
				new THREE.MeshStandardMaterial({ color: 0xff00ff })
			);
			leftArm.position.set(-0.65, 2.4, 0.3);
			leftArm.rotation.z = Math.PI / 4;
			leftArm.rotation.y = -Math.PI / 6;
			performerGroup.add(leftArm);

			const rightArm = new THREE.Mesh(
				new THREE.CylinderGeometry(0.15, 0.12, 1.0, 12),
				new THREE.MeshStandardMaterial({ color: 0xff00ff })
			);
			rightArm.position.set(0.65, 2.4, 0.3);
			rightArm.rotation.z = -Math.PI / 4;
			rightArm.rotation.y = Math.PI / 6;
			performerGroup.add(rightArm);

			const microphone = new THREE.Mesh(
				new THREE.SphereGeometry(0.15, 8, 8),
				new THREE.MeshStandardMaterial({ color: 0xdddddd })
			);
			microphone.position.set(0.9, 2.8, 0.4);
			performerGroup.add(microphone);

			performerGroup.position.set(0, 2, -10);
			scene.add(performerGroup);

			function flashInCrowd() {
				const flash = new THREE.PointLight(0xffffff, 3, 10);

				const randomPerson = crowd[Math.floor(Math.random() * crowd.length)];
				const pos = randomPerson.position.clone();
				flash.position.copy(pos).setY(pos.y + 2);
				scene.add(flash);
				setTimeout(() => scene.remove(flash), 200);
			}

			setInterval(() => {
				if (Math.random() > 0.6) flashInCrowd();
			}, 1500);

			camera.position.set(0, 5, 20);
			const controls = new THREE.OrbitControls(camera, renderer.domElement);
			controls.target.set(0, 5, -10);
			controls.update();
			controls.maxPolarAngle = Math.PI * 0.85;

			let velocity = new THREE.Vector3();
			const keys = { w: false, a: false, s: false, d: false };

			document.addEventListener("keydown", (e) => {
				if (keys.hasOwnProperty(e.key.toLowerCase()))
					keys[e.key.toLowerCase()] = true;
				if (e.key.toLowerCase() === "r") createEmojiReaction();
			});

			document.addEventListener("keyup", (e) => {
				if (keys.hasOwnProperty(e.key.toLowerCase()))
					keys[e.key.toLowerCase()] = false;
			});

			const chatMessages = document.getElementById("chat-messages");
			const chatInput = document.getElementById("chat-input");
			const chatSend = document.getElementById("chat-send");
			const randomUsers = [
				"Luna",
				"EchoWave",
				"RhythmKing",
				"StarGirl",
				"BeatMaster",
				"MelodyQueen",
			];
			const randomMessages = [
				"🔥🔥🔥",
				"I'm vibing hard!",
				"Let's goooo!",
				"Best concert ever!",
				"The lights are amazing!",
				"Who else is dancing?",
				"Turn it up! 🎵",
				"Can't wait for the next song!",
			];
			const colors = [
				"#ff4d4d",
				"#4dff4d",
				"#4d4dff",
				"#ffff4d",
				"#ff4dff",
				"#4dffff",
			];

			function getColor(user) {
				let hash = 0;
				for (let i = 0; i < user.length; i++)
					hash = user.charCodeAt(i) + ((hash << 5) - hash);
				return colors[Math.abs(hash) % colors.length];
			}

			function addMessage(user, message) {
				const li = document.createElement("li");
				li.className = "mb-2 p-2 rounded-lg bg-white/15";
				li.innerHTML = `<span style="color:${getColor(
					user
				)}">${user}</span>: ${message}`;
				chatMessages.appendChild(li);
				chatMessages.scrollTop = chatMessages.scrollHeight;
			}

			function createEmojiReaction(user = "") {
				const emojis = ["🎉", "❤️", "👏", "🔥", "⭐", "🎵", "🎸", "🥁"];
				const emoji = emojis[Math.floor(Math.random() * emojis.length)];
				const div = document.createElement("div");
				div.className = "emoji-reaction";
				div.innerText = emoji + (user ? ` ${user}` : "");
				div.style.left = `${Math.random() * 80 + 10}vw`;
				div.style.bottom = "10vh";
				document.body.appendChild(div);
				setTimeout(() => div.remove(), 3000);

				if (isPlaying) {
					cheerSound.currentTime = 0;
					cheerSound
						.play()
						.catch((err) => console.log("Cheer sound play error:", err));
				}
			}

			chatSend.onclick = () => {
				const msg = chatInput.value;
				if (msg) {
					addMessage("You", msg);
					chatInput.value = "";
				}
			};

			chatInput.addEventListener("keypress", (e) => {
				if (e.key === "Enter") chatSend.click();
			});

			document
				.getElementById("volume-slider")
				.addEventListener("input", (e) => {
					ambientSound.volume = (e.target.value / 100) * 0.3;
				});

			const settingsBtn = document.getElementById("settings-btn");
			const settingsPanel = document.getElementById("settings-panel");
			const settingsClose = document.getElementById("settings-close");
			const settingsSave = document.getElementById("settings-save");

			settingsBtn.addEventListener("click", () => {
				settingsPanel.classList.toggle("hidden");
			});

			settingsClose.addEventListener("click", () => {
				settingsPanel.classList.add("hidden");
			});

			settingsSave.addEventListener("click", () => {
				const graphicsQuality =
					document.getElementById("graphics-quality").value;
				const musicVolume = document.getElementById("music-volume").value / 100;
				const effectsVolume =
					document.getElementById("effects-volume").value / 100;

				if (isPlaying) {
					ambientSound.volume = musicVolume * 0.3;
					cheerSound.volume = effectsVolume * 0.5;
				}

				switch (graphicsQuality) {
					case "low":
						renderer.setPixelRatio(window.devicePixelRatio * 0.5);
						break;
					case "medium":
						renderer.setPixelRatio(window.devicePixelRatio * 0.75);
						break;
					case "high":
						renderer.setPixelRatio(window.devicePixelRatio);
						break;
				}

				settingsPanel.classList.add("hidden");
			});

			const loginBtn = document.getElementById("login-btn");
			const loginModal = document.getElementById("login-modal");
			const loginClose = document.getElementById("login-close");

			loginBtn.addEventListener("click", () => {
				loginModal.classList.remove("hidden");
				loginModal.classList.add("flex");
			});

			loginClose.addEventListener("click", () => {
				loginModal.classList.add("hidden");
				loginModal.classList.remove("flex");
			});

			setInterval(() => {
				const randomUser =
					randomUsers[Math.floor(Math.random() * randomUsers.length)];
				const randomMessage =
					randomMessages[Math.floor(Math.random() * randomMessages.length)];
				addMessage(randomUser, randomMessage);
			}, 5000);

			setInterval(() => {
				if (Math.random() > 0.7) {
					const randomUser =
						randomUsers[Math.floor(Math.random() * randomUsers.length)];
					createEmojiReaction(randomUser);
				}
			}, 4000);

			let bobCounter = 0;

			function animate() {
				requestAnimationFrame(animate);

				const acc = 0.01,
					friction = 0.95;
				if (keys.w) velocity.z += acc;
				if (keys.s) velocity.z -= acc;
				if (keys.a) velocity.x -= acc;
				if (keys.d) velocity.x += acc;
				velocity.multiplyScalar(friction);

				performerGroup.rotation.y += 0.01;

				updateLasers();

				const direction = new THREE.Vector3();
				camera.getWorldDirection(direction);
				const left = new THREE.Vector3()
					.crossVectors(direction, camera.up)
					.normalize();
				const forward = direction.clone().normalize();
				camera.position.addScaledVector(left, velocity.x);
				camera.position.addScaledVector(forward, velocity.z);

				spotLight1.position.x = -10 + Math.sin(Date.now() * 0.001) * 10;
				spotLight2.position.x = 10 + Math.cos(Date.now() * 0.001) * 10;
				spotLight3.position.z = -10 + Math.sin(Date.now() * 0.0015) * 8;

				stage.scale.y = 1 + Math.sin(Date.now() * 0.005) * 0.05;

				bobCounter += 0.03;
				camera.position.y = 5 + Math.sin(bobCounter) * 0.1;

				const pos = particles.geometry.attributes.position.array;
				for (let i = 0; i < particleCount * 3; i++) {
					pos[i] += velocities[i];
					if (pos[i] > 50) pos[i] = -50;
					if (pos[i] < -50) pos[i] = 50;
				}
				particles.geometry.attributes.position.needsUpdate = true;

				crowd.forEach((person, i) => {
					const time = Date.now() * 0.001;
					const baseY = person.userData.baseY;
					const height = person.userData.height;

					const jumpProbability = i % 7;

					if (jumpProbability === 0) {
						const jumpHeight = 0.3;
						const jumpFrequency = 0.8;

						const jumpPhase = Math.floor(time / jumpFrequency) % 4;

						if (jumpPhase < 0.8) {
							const jumpProgress = (time % jumpFrequency) / 0.8;
							const jumpCurve = Math.sin(jumpProgress * Math.PI);
							person.position.y = baseY + jumpCurve * jumpHeight;

							if (person.children.length > 2) {
								person.children[0].rotation.z =
									-Math.PI / 2.5 + Math.sin(time * 3) * 0.1;
								person.children[1].rotation.z =
									Math.PI / 2.5 - Math.sin(time * 3) * 0.1;
							}
						} else {
							person.position.y = baseY + Math.sin(time * 2 + i) * 0.05;

							if (person.children.length > 2) {
								person.children[0].rotation.z =
									-Math.PI / 4 + Math.sin(time * 1.2) * 0.1;
								person.children[1].rotation.z =
									Math.PI / 4 - Math.sin(time * 1.2) * 0.1;
							}
						}

						if (person.children[1]) {
							person.children[1].rotation.z = Math.sin(time * 2 + i) * 0.15;
						}
					} else if (jumpProbability === 1) {
						const jumpPattern = Math.sin(time * 0.4 + i * 0.7);

						if (jumpPattern > 0.7) {
							const jumpAmount = (jumpPattern - 0.7) * 0.8;
							person.position.y = baseY + jumpAmount;

							if (person.children.length > 2) {
								const armLift = (jumpPattern - 0.7) * 0.5;
								person.children[0].rotation.z = -Math.PI / 4 - armLift;
								person.children[1].rotation.z = Math.PI / 4 + armLift;
							}
						} else {
							person.position.y = baseY + Math.sin(time * 1.5 + i) * 0.05;

							if (person.children.length > 2) {
								person.children[0].rotation.z =
									-Math.PI / 4 + Math.sin(time * 1.2 + i) * 0.15;
								person.children[1].rotation.z =
									Math.PI / 4 - Math.sin(time * 1.2 + i) * 0.15;
							}
						}

						if (person.children[1]) {
							person.children[1].rotation.z = Math.sin(time * 1.8 + i) * 0.1;
						}
					} else if (jumpProbability === 2) {
						person.position.y = baseY + Math.sin(time * 2 + i) * 0.05;
						person.rotation.y = Math.sin(time * 0.8 + i * 0.2) * 0.15;
						person.rotation.z = Math.sin(time * 0.9 + i * 0.3) * 0.1;

						if (person.children.length > 2) {
							person.children[0].rotation.z =
								-Math.PI / 4 + Math.sin(time + i) * 0.25;
							person.children[1].rotation.z =
								Math.PI / 4 - Math.sin(time + i) * 0.25;
						}

						if (person.children[1]) {
							person.children[1].rotation.z = -Math.sin(time + i * 0.3) * 0.12;
						}
					} else if (jumpProbability === 3) {
						const hopFrequency = 1.2;
						const hopPhase = (time * hopFrequency + i * 0.1) % 1;

						let hopHeight;
						if (hopPhase < 0.3) {
							hopHeight = (hopPhase / 0.3) * 0.15;
						} else {
							hopHeight = (1 - (hopPhase - 0.3) / 0.7) * 0.15;
						}

						person.position.y = baseY + hopHeight;

						if (person.children.length > 2) {
							person.children[0].rotation.z =
								-Math.PI / 4 + Math.sin(time * hopFrequency + i) * 0.1;
							person.children[1].rotation.z =
								Math.PI / 4 - Math.sin(time * hopFrequency + i) * 0.1;
						}

						if (person.children[1]) {
							person.children[1].rotation.z =
								Math.sin(time * hopFrequency + i) * 0.08;
						}
					} else if (jumpProbability === 4) {
						person.position.y = baseY + Math.sin(time * 1.2 + i) * 0.02;

						if (person.children[1]) {
							person.children[1].rotation.x = Math.sin(time * 2 + i) * 0.3;
						}

						if (person.children.length > 2) {
							person.children[0].rotation.z =
								-Math.PI / 4 + Math.sin(time * 1.5 + i) * 0.2;
							person.children[1].rotation.z =
								Math.PI / 4 - Math.sin(time * 1.5 + i) * 0.2;
						}
					} else if (jumpProbability === 5) {
						const bounceFreq = 1.5;
						person.position.y =
							baseY + Math.abs(Math.sin(time * bounceFreq + i * 0.2)) * 0.12;

						if (person.children.length > 2) {
							person.children[0].rotation.z =
								-Math.PI / 4 + Math.sin(time * bounceFreq + i) * 0.2;
							person.children[1].rotation.z =
								Math.PI / 4 - Math.sin(time * bounceFreq + i) * 0.2;
						}

						person.rotation.y = Math.sin(time * 0.4 + i) * 0.1;
					} else {
						person.position.y = baseY + Math.sin(time + i * 0.5) * 0.03;
						person.rotation.y =
							person.rotation.y + Math.sin(time * 0.2) * 0.002;

						if (person.children.length > 2) {
							person.children[0].rotation.z =
								-Math.PI / 4 + Math.sin(time * 0.8 + i) * 0.1;
							person.children[1].rotation.z =
								Math.PI / 4 - Math.sin(time * 0.8 + i) * 0.1;
						}

						if (person.children[1]) {
							person.children[1].rotation.z = Math.sin(time + i) * 0.05;
						}
					}

					if (Math.sin(time * 0.3 + i * 0.7) > 0.97) {
						if (person.children.length > 2) {
							person.children[0].rotation.z = -Math.PI / 2.2;
							person.children[1].rotation.z = Math.PI / 2.2;
						}
					}
				});

				controls.update();
				renderer.render(scene, camera);
			}

			let isPlaying = false;
			const playButtonContainer = document.getElementById(
				"play-button-container"
			);
			const playButton = document.getElementById("play-button");
			const floatingPlayButton = document.getElementById(
				"floating-play-button"
			);
			const playIcon = document.getElementById("play-icon");
			const pauseIcon = document.getElementById("pause-icon");

			function togglePlayback() {
				if (!isPlaying) {
					const audioPromise = ambientSound.play().catch((err) => {
						console.log("Audio play error:", err);
						return Promise.reject(err);
					});

					const videoPromise = Promise.resolve()
						.then(() => {
							video.muted = false;
							return video.play();
						})
						.catch((err) => {
							console.log("Video play error:", err);
							return Promise.reject(err);
						});

					Promise.all([audioPromise, videoPromise])
						.then(() => {
							console.log("Media playback started successfully");
							isPlaying = true;

							playButtonContainer.classList.add("hidden");
							floatingPlayButton.classList.remove("hidden");
							playIcon.classList.add("hidden");
							pauseIcon.classList.remove("hidden");

							const musicVolume =
								document.getElementById("music-volume").value / 100;
							ambientSound.volume = musicVolume * 0.3;
						})
						.catch((err) => {
							console.error("Could not start media playback:", err);

							alert("Tap again to enable audio!");
						});
				} else {
					ambientSound.pause();
					video.pause();
					isPlaying = false;

					playIcon.classList.remove("hidden");
					pauseIcon.classList.add("hidden");
				}
			}

			playButton.addEventListener("click", togglePlayback);
			floatingPlayButton.addEventListener("click", togglePlayback);

			document.addEventListener("keydown", (e) => {
				if (e.code === "Space") {
					togglePlayback();
					e.preventDefault();
				}
			});

			animate();

			const mobileControls = document.getElementById("mobile-controls");

			if (window.innerWidth <= 768) {
				mobileControls.classList.remove("hidden");
				mobileControls.classList.add("flex");
			}

			window.addEventListener("resize", () => {
				if (window.innerWidth <= 768) {
					mobileControls.classList.remove("hidden");
					mobileControls.classList.add("flex");
				} else {
					mobileControls.classList.add("hidden");
					mobileControls.classList.remove("flex");
				}
			});

			document.querySelectorAll("#mobile-controls button").forEach((button) => {
				const touchStartHandler = () => {
					const key = button.dataset.dir;

					button.classList.add("bg-white/40");
					button.classList.add("scale-95");
					button.classList.add("shadow-sm");

					if (keys.hasOwnProperty(key)) {
						keys[key] = true;
					}
					if (key === "r") createEmojiReaction();
				};

				const touchEndHandler = () => {
					const key = button.dataset.dir;

					button.classList.remove("bg-white/40");
					button.classList.remove("scale-95");
					button.classList.remove("shadow-sm");

					if (keys.hasOwnProperty(key)) {
						keys[key] = false;
					}
				};

				button.addEventListener("touchstart", touchStartHandler);
				button.addEventListener("mousedown", touchStartHandler);
				button.addEventListener("touchend", touchEndHandler);
				button.addEventListener("mouseup", touchEndHandler);
				button.addEventListener("mouseleave", touchEndHandler);
			});
		</script>
	</body>
</html>
