<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>FontPairer - Design with confidence</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
		/>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							primary: "#4F46E5",
							"primary-dark": "#4338CA",
							"primary-light": "#EEF2FF",
						},
					},
				},
			};
		</script>
	</head>
	<body class="bg-gradient-to-b from-blue-50 to-white min-h-screen">
		<!-- Header/Navigation -->
		<header class="border-b border-gray-200 bg-white sticky top-0 z-10">
			<div
				class="container mx-auto px-4 py-3 flex items-center justify-between"
			>
				<!-- Logo -->
				<div class="flex items-center">
					<div class="text-primary text-2xl mr-2">
						<i class="fas fa-sun"></i>
					</div>
					<div>
						<h1 class="text-xl font-bold text-gray-800">FontPairer</h1>
						<p class="text-xs text-gray-600">Design with confidence</p>
					</div>
				</div>

				<!-- Navigation -->
				<nav class="hidden md:flex space-x-8">
					<a href="#" class="text-gray-600 hover:text-primary">Home</a>
					<a href="#" class="text-gray-600 hover:text-primary">Features</a>
					<a href="#" class="text-gray-600 hover:text-primary"
						>Comparison Tool</a
					>
					<a href="#" class="text-gray-600 hover:text-primary">About</a>
				</nav>

				<!-- CTA Button -->
				<button
					class="bg-primary hover:bg-primary-dark text-white py-2 px-6 rounded-md transition duration-300"
				>
					Start Comparing
				</button>

				<!-- Mobile menu button -->
				<button class="md:hidden text-gray-600">
					<i class="fas fa-bars text-xl"></i>
				</button>
			</div>
		</header>

		<!-- Hero Section -->
		<section class="py-16 px-4">
			<div class="container mx-auto text-center max-w-4xl mb-12">
				<h2 class="text-4xl md:text-5xl font-bold mb-6">
					<span class="text-gray-800">Font & Color</span>
					<span class="text-primary">Comparison Tool</span>
				</h2>
				<p class="text-gray-600 text-lg mb-10">
					Create stunning and accessible design combinations with our powerful
					comparison tool
				</p>
				<div class="flex justify-center space-x-4">
					<button
						class="bg-primary hover:bg-primary-dark text-white py-3 px-8 rounded-md transition duration-300"
					>
						Get Started
					</button>
					<button
						class="border border-gray-300 text-gray-700 hover:bg-gray-50 py-3 px-8 rounded-md transition duration-300"
					>
						Learn More
					</button>
				</div>
			</div>

			<!-- Hero Image -->
			<div class="container mx-auto relative">
				<!-- Background decorative elements -->
				<div
					class="absolute -left-20 top-10 w-40 h-40 bg-blue-100 rounded-full opacity-50"
				></div>
				<div
					class="absolute -right-10 bottom-10 w-40 h-40 bg-blue-100 rounded-full opacity-70"
				></div>

				<div class="relative z-0 rounded-xl overflow-hidden shadow-xl">
					<img
						src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2072&q=80"
						alt="Workspace with desktop and laptop computers showing design work"
						class="w-full h-auto object-cover"
					/>
				</div>
			</div>
		</section>

		<script>
			// Mobile menu toggle
			document.addEventListener("DOMContentLoaded", function () {
				const menuButton = document.querySelector(".md\\:hidden");
				const mobileMenu = document.createElement("div");
				mobileMenu.className =
					"fixed inset-0 bg-white z-50 flex flex-col items-center justify-center text-xl space-y-6 transform transition-transform duration-300 translate-x-full";
				mobileMenu.innerHTML = `
                <button class="absolute top-4 right-4 text-gray-600">
                    <i class="fas fa-times text-2xl"></i>
                </button>
                <a href="#" class="text-gray-800 hover:text-primary">Home</a>
                <a href="#" class="text-gray-800 hover:text-primary">Features</a>
                <a href="#" class="text-gray-800 hover:text-primary">Comparison Tool</a>
                <a href="#" class="text-gray-800 hover:text-primary">About</a>
                <button class="bg-primary hover:bg-primary-dark text-white py-2 px-6 rounded-md mt-4 transition duration-300">
                    Start Comparing
                </button>
            `;
				document.body.appendChild(mobileMenu);

				const closeButton = mobileMenu.querySelector("button");

				menuButton.addEventListener("click", function () {
					mobileMenu.classList.remove("translate-x-full");
				});

				closeButton.addEventListener("click", function () {
					mobileMenu.classList.add("translate-x-full");
				});
			});
		</script>
	</body>
</html>
